<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>A Birthday To Remember 🎬</title>

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>

<script>
tailwind.config = {
  theme: {
    extend: {
      fontFamily: {
        sans: ["Inter", "system-ui", "sans-serif"]
      }
    }
  }
}
</script>

<!-- React -->
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

<!-- Babel -->
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<!-- Lucide -->
<script src="https://unpkg.com/lucide@latest"></script>

<style>

html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  background: black;
  overflow: hidden;
}

#root {
  width: 100%;
  height: 100%;
}

</style>

</head>

<body>

<div id="root"></div>

<script type="text/babel">

/* ===============================
   REACT SETUP
=============================== */

const {
  useState,
  useEffect,
  useRef
} = React;

/* ===============================
   GLOBAL LOGO
=============================== */

const LOGO_URL =
"https://www.dropbox.com/scl/fi/zddc2wx1ffqste07xtolu/A-BIRTHDAY-TO-REMEMBER-LOGO.png?rlkey=ul9r223iaas275h9f6wfn1wq4&raw=1";

/* ===============================
   DUST PARTICLES
=============================== */

function DustParticles() {

  const canvasRef = useRef(null);

  useEffect(() => {

    const canvas = canvasRef.current;
    const ctx = canvas.getContext("2d");

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    resize();
    window.addEventListener("resize", resize);

    let particles = [];

    for (let i=0;i<80;i++) {

      particles.push({
        x: Math.random()*canvas.width,
        y: Math.random()*canvas.height,
        r: Math.random()*2,
        dx:(Math.random()-0.5)*0.2,
        dy:(Math.random()-0.5)*0.2
      });

    }

    function draw() {

      ctx.clearRect(0,0,canvas.width,canvas.height);

      ctx.fillStyle="rgba(255,255,255,0.2)";

      particles.forEach(p=>{

        ctx.beginPath();
        ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fill();

        p.x+=p.dx;
        p.y+=p.dy;

        if(p.x<0)p.x=canvas.width;
        if(p.x>canvas.width)p.x=0;
        if(p.y<0)p.y=canvas.height;
        if(p.y>canvas.height)p.y=0;

      });

      requestAnimationFrame(draw);

    }

    draw();

  },[]);

  return (
    <canvas
      ref={canvasRef}
      className="fixed inset-0 pointer-events-none z-0"
    />
  );

}

/* ===============================
   CONFETTI
=============================== */

function ConfettiCanvas({active}) {

  const canvasRef = useRef(null);

  useEffect(()=>{

    if(!active) return;

    const canvas = canvasRef.current;
    const ctx = canvas.getContext("2d");

    canvas.width=window.innerWidth;
    canvas.height=window.innerHeight;

    let confetti=[];

    for(let i=0;i<150;i++){

      confetti.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        r:Math.random()*6,
        dy:Math.random()*3+2,
        color:`hsl(${Math.random()*360},100%,50%)`
      });

    }

    function draw(){

      ctx.clearRect(0,0,canvas.width,canvas.height);

      confetti.forEach(c=>{

        ctx.fillStyle=c.color;

        ctx.beginPath();
        ctx.arc(c.x,c.y,c.r,0,Math.PI*2);
        ctx.fill();

        c.y+=c.dy;

        if(c.y>canvas.height){
          c.y=0;
        }

      });

      requestAnimationFrame(draw);

    }

    draw();

  },[active]);

  return (
    <canvas
      ref={canvasRef}
      className="fixed inset-0 pointer-events-none z-50"
    />
  );

}

/* ===============================
   BARCODE
=============================== */

function BarcodeGenerator({code}) {

  const canvasRef=useRef(null);

  useEffect(()=>{

    const canvas=canvasRef.current;
    const ctx=canvas.getContext("2d");

    canvas.width=300;
    canvas.height=100;

    ctx.fillStyle="#fff";
    ctx.fillRect(0,0,300,100);

    ctx.fillStyle="#000";

    for(let i=0;i<code.length;i++){

      let x=i*5;

      if(code.charCodeAt(i)%2===0){
        ctx.fillRect(x,0,3,80);
      }

    }

  },[code]);

  return(
    <canvas
      ref={canvasRef}
      className="mx-auto bg-white rounded-lg shadow-lg"
    />
  );

}

/* ===============================
   VIDEO PLAYER
=============================== */

function VideoPlayer({videoUrl,onEnd}) {

  const videoRef=useRef(null);

  useEffect(()=>{

    const video=videoRef.current;

    const handleEnded=()=>{
      onEnd && onEnd();
    };

    video.addEventListener("ended",handleEnded);

    return ()=>{
      video.removeEventListener("ended",handleEnded);
    };

  },[]);

  return(

    <div className="fixed inset-0 bg-black flex items-center justify-center z-40">

      <video
        ref={videoRef}
        src={videoUrl}
        controls
        autoPlay
        className="w-full h-full object-contain"
      />

    </div>

  );

}

/* ===============================
   LOGO SCREEN
=============================== */

function LogoScreen({onStart}){

  return(

    <div className="fixed inset-0 flex flex-col items-center justify-center text-white z-20">

      <img
        src={LOGO_URL}
        className="w-72 mb-10"
      />

      <button
        onClick={onStart}
        className="px-8 py-4 bg-white text-black text-xl rounded-2xl"
      >
        🎬 Enter Theater
      </button>

    </div>

  );

}

/* ===============================
   TICKET VIEW
=============================== */

function TicketView({code,onContinue}){

  return(

    <div className="fixed inset-0 flex flex-col items-center justify-center text-white z-30">

      <h1 className="text-5xl font-bold mb-6">
        🎟 Your Ticket
      </h1>

      <BarcodeGenerator code={code}/>

      <button
        onClick={onContinue}
        className="mt-8 px-6 py-3 bg-white text-black rounded-xl"
      >
        Continue
      </button>

    </div>

  );

}

/* ===============================
   CAMERA
=============================== */

function CameraScanner({onScan}){

  const videoRef=useRef(null);

  useEffect(()=>{

    async function startCamera(){

      try{

        const stream=
        await navigator.mediaDevices.getUserMedia({
          video:true
        });

        videoRef.current.srcObject=stream;

      }catch(err){

        console.error(err);

      }

    }

    startCamera();

  },[]);

  return(

    <div className="fixed inset-0 flex flex-col items-center justify-center text-white z-30">

      <video
        ref={videoRef}
        autoPlay
        className="w-96 rounded-xl border"
      />

      <button
        onClick={()=>onScan("BIRTHDAY2026")}
        className="mt-6 px-6 py-3 bg-white text-black rounded-xl"
      >
        Simulate Scan
      </button>

    </div>

  );

}

/* ===============================
   STAGE
=============================== */

function TheaterStage({onPlayVideo}){

  return(

    <div className="fixed inset-0 flex flex-col items-center justify-center text-white z-10">

      <h1 className="text-6xl font-bold mb-6">
        🎬 Showtime
      </h1>

      <button
        onClick={onPlayVideo}
        className="px-8 py-4 bg-white text-black rounded-2xl text-xl"
      >
        ▶ Play Birthday Film
      </button>

    </div>

  );

}

/* ===============================
   MAIN APP
=============================== */

function App(){

  const [scene,setScene]=useState("logo");
  const [ticketCode]=useState("BIRTHDAY2026");
  const [showConfetti,setShowConfetti]=useState(false);
  const [videoPlaying,setVideoPlaying]=useState(false);

  const VIDEO_URL=
  "https://www.dropbox.com/scl/fi/0k0b2rltlppcyhqhgz3hi/A-Birthday-To-Remember.mp4?rlkey=xb4t2kxp5hkc7xumtbt9l3avd&st=axprw64n&dl=1";

  function handleStart(){
    setScene("ticket");
  }

  function handleTicketContinue(){
    setScene("scanner");
  }

  function handleScan(code){

    if(code===ticketCode){

      setScene("stage");

      setShowConfetti(true);

      setTimeout(()=>{
        setShowConfetti(false);
      },5000);

    }

  }

  function handlePlayVideo(){
    setVideoPlaying(true);
  }

  function handleVideoEnd(){

    setVideoPlaying(false);
    setShowConfetti(true);

  }

  return(

    <div className="w-full h-full relative bg-black overflow-hidden">

      <DustParticles/>

      <ConfettiCanvas active={showConfetti}/>

      {scene==="logo" &&
        <LogoScreen onStart={handleStart}/>
      }

      {scene==="ticket" &&
        <TicketView
          code={ticketCode}
          onContinue={handleTicketContinue}
        />
      }

      {scene==="scanner" &&
        <CameraScanner
          onScan={handleScan}
        />
      }

      {scene==="stage" &&
        <TheaterStage
          onPlayVideo={handlePlayVideo}
        />
      }

      {videoPlaying &&
        <VideoPlayer
          videoUrl={VIDEO_URL}
          onEnd={handleVideoEnd}
        />
      }

    </div>

  );

}

/* ===============================
   RENDER
=============================== */

ReactDOM.createRoot(
  document.getElementById("root")
).render(
  <App/>
);

</script>

</body>
</html>
