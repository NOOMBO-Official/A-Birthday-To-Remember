import React, { useState, useEffect, useRef, useMemo } from 'react';
import { Play, Settings, Sparkles, Camera, Ticket, Terminal, Barcode, Check, X, QrCode, Download } from 'lucide-react';

// --- BRAND ASSETS ---
const LOGO_URL = 'https://www.dropbox.com/scl/fi/zddc2wx1ffqste07xtolu/A-BIRTHDAY-TO-REMEMBER-LOGO.png?rlkey=ul9r223iaas275h9f6wfn1wq4&st=zx5g77eu&raw=1';

// --- DUST PARTICLES COMPONENT ---
const DustParticles = () => {
  const particles = Array.from({ length: 40 });
  return (
    <div className="absolute inset-0 z-20 pointer-events-none overflow-hidden">
      {particles.map((_, i) => (
        <div
          key={i}
          className="absolute bg-yellow-100/30 rounded-full animate-[float-dust_linear_infinite]"
          style={{
            width: `${Math.random() * 4 + 1}px`,
            height: `${Math.random() * 4 + 1}px`,
            left: `${Math.random() * 100}%`,
            top: `${Math.random() * 100}%`,
            animationDuration: `${Math.random() * 10 + 10}s`,
            animationDelay: `-${Math.random() * 20}s`,
            opacity: Math.random() * 0.5 + 0.1
          }}
        />
      ))}
    </div>
  );
};

// --- CONFETTI COMPONENT FOR FINALE ---
const Confetti = () => {
  const canvasRef = useRef(null);

  useEffect(() => {
    const canvas = canvasRef.current;
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const confettiParticles = Array.from({ length: 200 }).map(() => ({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height - canvas.height,
      size: Math.random() * 10 + 5,
      color: `hsl(${Math.random() * 360}, 100%, 50%)`,
      speedY: Math.random() * 3 + 2,
      speedX: Math.random() * 4 - 2,
      rotation: Math.random() * 360,
      rotationSpeed: Math.random() * 10 - 5
    }));

    let animationFrame;
    const render = () => {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      confettiParticles.forEach(p => {
        p.y += p.speedY;
        p.x += p.speedX;
        p.rotation += p.rotationSpeed;
        
        if (p.y > canvas.height) {
          p.y = -10;
          p.x = Math.random() * canvas.width;
        }

        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate((p.rotation * Math.PI) / 180);
        ctx.fillStyle = p.color;
        ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size);
        ctx.restore();
      });
      animationFrame = requestAnimationFrame(render);
    };
    render();

    const handleResize = () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    };
    window.addEventListener('resize', handleResize);

    return () => {
      cancelAnimationFrame(animationFrame);
      window.removeEventListener('resize', handleResize);
    };
  }, []);

  return <canvas ref={canvasRef} className="absolute inset-0 z-50 pointer-events-none" />;
};

// --- ACTUAL BARCODE GENERATOR COMPONENT ---
const getBarcodePattern = (value) => {
  let pattern = [2, 1, 4, 1, 2, 2]; 
  for (let i = 0; i < value.length; i++) {
    const code = value.charCodeAt(i);
    pattern.push((code % 3) + 1);
    pattern.push((code % 2) + 1);
    pattern.push(((code * 2) % 3) + 1);
    pattern.push(1);
  }
  pattern.push(...[2, 2, 4, 1, 2]); 
  return pattern;
};

// This takes any string and generates an authentic-looking variable-width barcode graphic
const GeneratedBarcode = ({ value }) => {
  const bars = useMemo(() => getBarcodePattern(value), [value]);

  return (
    <div className="flex items-center justify-center bg-white py-4 px-6 rounded-2xl w-full shadow-inner">
      <div className="flex items-stretch h-16 sm:h-20 w-full justify-center">
        {bars.map((width, i) => (
          <div 
            key={i} 
            className={i % 2 === 0 ? "bg-black" : "bg-transparent"} 
            style={{ width: `${width * 2.5}px` }}
          />
        ))}
      </div>
    </div>
  );
};

// --- COUNTDOWN COMPONENT ---
const Countdown = ({ targetDate }) => {
  const calculateTimeLeft = () => {
    const difference = +new Date(targetDate) - +new Date();
    let timeLeft = {};

    if (difference > 0) {
      timeLeft = {
        Days: Math.floor(difference / (1000 * 60 * 60 * 24)),
        Hours: Math.floor((difference / (1000 * 60 * 60)) % 24),
        Minutes: Math.floor((difference / 1000 / 60) % 60),
        Seconds: Math.floor((difference / 1000) % 60)
      };
    }
    return timeLeft;
  };

  const [timeLeft, setTimeLeft] = useState(calculateTimeLeft());

  useEffect(() => {
    const timer = setTimeout(() => {
      setTimeLeft(calculateTimeLeft());
    }, 1000);
    return () => clearTimeout(timer);
  });

  const timerComponents = [];

  Object.keys(timeLeft).forEach((interval) => {
    timerComponents.push(
      <div key={interval} className="flex flex-col items-center justify-center bg-white/5 border border-white/10 rounded-2xl w-20 h-24 sm:w-24 sm:h-28 mx-2 backdrop-blur-md shadow-lg">
        <span className="text-3xl sm:text-4xl font-bold text-white mb-1 font-mono">{timeLeft[interval].toString().padStart(2, '0')}</span>
        <span className="text-[10px] sm:text-xs text-white/50 uppercase tracking-widest">{interval}</span>
      </div>
    );
  });

  return (
    <div className="flex justify-center items-center">
      {timerComponents.length ? timerComponents : <span className="text-2xl text-green-400 font-bold tracking-widest">IT'S TIME! 🎉</span>}
    </div>
  );
};

// --- MINIMALIST APPLE-INSPIRED TICKET SCANNER ---
const TicketScanner = ({ onAccessGranted }) => {
  const videoRef = useRef(null);
  const [scanState, setScanState] = useState('idle'); // idle, scanning, verifying, granted, denied, error
  const [cameraActive, setCameraActive] = useState(false);
  const [inputCode, setInputCode] = useState('');
  
  // Developer Mode States
  const [devMode, setDevMode] = useState(false);

  // Generate a random clean alphanumeric barcode string
  const [secretCode] = useState(() => {
    const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
    const gen = (len) => Array.from({length: len}, () => chars[Math.floor(Math.random() * chars.length)]).join('');
    return `VIP-${gen(4)}`;
  });

  // Listen for Shift + D to open Developer Settings
  useEffect(() => {
    const handleKeyDown = (e) => {
      if (e.shiftKey && e.key.toLowerCase() === 'd') {
        setDevMode(prev => !prev);
      }
    };
    window.addEventListener('keydown', handleKeyDown);
    return () => window.removeEventListener('keydown', handleKeyDown);
  }, []);

  const downloadBarcodeImage = () => {
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    const pattern = getBarcodePattern(secretCode);
    const totalWidth = pattern.reduce((acc, val) => acc + val * 2.5, 0);
    
    // Set up canvas dimensions
    canvas.width = totalWidth + 40;
    canvas.height = 120;
    
    // Fill white background
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // Draw barcode bars
    let x = 20;
    pattern.forEach((width, i) => {
      const barWidth = width * 2.5;
      if (i % 2 === 0) {
        ctx.fillStyle = '#000000';
        ctx.fillRect(x, 15, barWidth, 70);
      }
      x += barWidth;
    });
    
    // Draw text underneath
    ctx.fillStyle = '#000000';
    ctx.font = 'bold 16px monospace';
    ctx.textAlign = 'center';
    ctx.letterSpacing = '4px';
    ctx.fillText(secretCode, canvas.width / 2, 105);
    
    // Trigger download
    const link = document.createElement('a');
    link.download = `VIP-Pass-${secretCode}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
  };

  // Initialize Camera
  useEffect(() => {
    let stream;
    const startCamera = async () => {
      try {
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
        if (videoRef.current) {
          videoRef.current.srcObject = stream;
          setCameraActive(true);
        }
      } catch (err) {
        console.error("Camera access denied or not available", err);
        setScanState('error');
      }
    };
    startCamera();

    return () => {
      if (stream) {
        stream.getTracks().forEach(track => track.stop());
      }
    };
  }, []);

  const handleAuthentication = (e) => {
    if (e) e.preventDefault();
    if (scanState !== 'idle' && scanState !== 'denied') return;
    
    setScanState('scanning');
    
    // Smooth Apple-like simulated scanning delay
    setTimeout(() => {
      setScanState('verifying');
      
      setTimeout(() => {
        if (inputCode.trim().toUpperCase() === secretCode) {
          setScanState('granted');
          setTimeout(() => {
            onAccessGranted();
          }, 1500);
        } else {
          setScanState('denied');
          setTimeout(() => {
            setScanState('idle');
            setInputCode('');
          }, 2000);
        }
      }, 1200);
    }, 1000);
  };

  return (
    <div className="fixed inset-0 w-full h-[100dvh] bg-black overflow-hidden font-sans z-50 transition-colors duration-700">
      
      {/* DEVELOPER SETTINGS OVERLAY (Shows Actual Barcode) */}
      {devMode && (
        <div className="fixed top-6 left-1/2 -translate-x-1/2 z-[60] w-[90%] max-w-sm bg-white/10 backdrop-blur-2xl border border-white/20 p-6 rounded-[2rem] shadow-2xl flex flex-col items-center animate-[fade-in-down_0.4s_ease-out]">
          <div className="flex items-center space-x-2 mb-2 opacity-70">
            <Terminal className="w-5 h-5 text-white" />
            <h2 className="text-white font-medium text-sm tracking-wider">DEV OVERRIDE</h2>
          </div>
          <p className="text-[10px] text-white/50 mb-5 text-center">VALID VIP BARCODE GENERATED</p>
          
          {/* THE ACTUAL GENERATED BARCODE */}
          <div className="bg-white rounded-2xl p-2 w-full shadow-2xl">
            <GeneratedBarcode value={secretCode} />
          </div>
          <p className="text-white/80 font-mono tracking-[0.3em] mt-4 text-sm font-semibold">{secretCode}</p>

          {/* DOWNLOAD BUTTON */}
          <button 
            onClick={downloadBarcodeImage}
            className="mt-5 w-full py-3 bg-white/10 hover:bg-white/20 border border-white/20 rounded-xl text-white font-medium text-xs tracking-wider transition-all flex items-center justify-center space-x-2 active:scale-95"
          >
            <Download className="w-4 h-4" />
            <span>DOWNLOAD IMAGE</span>
          </button>
        </div>
      )}

      {/* Live Camera Feed Background */}
      {scanState !== 'error' ? (
        <video 
          ref={videoRef} 
          autoPlay 
          playsInline 
          muted 
          className={`absolute inset-0 w-full h-full object-cover transition-all duration-[2000ms] ease-out ${cameraActive ? 'opacity-40 scale-100 blur-sm' : 'opacity-0 scale-110 blur-xl'}`} 
        />
      ) : (
        <div className="absolute inset-0 w-full h-full flex items-center justify-center bg-zinc-900 opacity-50">
          <Camera className="w-24 h-24 text-zinc-700" />
        </div>
      )}

      {/* Dark Gradient Overlay for Readability */}
      <div className="absolute inset-0 bg-gradient-to-t from-black via-black/40 to-black/20 pointer-events-none"></div>

      {/* Main UI Container */}
      <div className="relative z-10 w-full h-full max-w-md mx-auto flex flex-col items-center justify-between py-6 px-4 sm:px-6">
        
        {/* Header */}
        <div className="flex flex-col items-center mt-4 sm:mt-8 space-y-3 w-full max-w-[280px]">
          <div className="w-10 h-10 sm:w-12 sm:h-12 rounded-2xl bg-white/10 backdrop-blur-xl border border-white/20 flex items-center justify-center shadow-xl">
            <Camera className="w-5 h-5 sm:w-6 sm:h-6 text-white" />
          </div>
          <h1 className="text-lg sm:text-xl font-medium text-white tracking-wide">Scan Ticket</h1>
          <p className="text-[10px] sm:text-xs text-white/60 font-light text-center">Position the barcode within the frame.</p>
        </div>

        {/* Apple-Inspired Viewfinder */}
        <div className="relative w-[45vw] max-w-[220px] sm:max-w-[280px] aspect-square my-auto flex-shrink flex items-center justify-center">
          {/* iOS Style Corners */}
          <div className={`absolute inset-0 transition-all duration-500 rounded-3xl sm:rounded-[2.5rem] ${scanState === 'denied' ? 'border-red-500/50 scale-105' : scanState === 'granted' ? 'border-green-500/50 scale-95' : 'border-white/30'} border-[3px]`} style={{ clipPath: 'polygon(0 0, 25% 0, 0 25%, 0 0, 75% 0, 100% 0, 100% 25%, 100% 0, 100% 75%, 100% 100%, 75% 100%, 100% 100%, 0 100%, 25% 100%, 0 100%, 0 75%)', borderStyle: 'solid' }}></div>
          
          {/* Corner Elements manually for better control */}
          <div className={`absolute top-0 left-0 w-8 h-8 sm:w-12 sm:h-12 border-t-[3px] border-l-[3px] rounded-tl-3xl sm:rounded-tl-[2.5rem] transition-colors duration-500 ${scanState === 'denied' ? 'border-red-400' : scanState === 'granted' ? 'border-green-400' : 'border-white'}`}></div>
          <div className={`absolute top-0 right-0 w-8 h-8 sm:w-12 sm:h-12 border-t-[3px] border-r-[3px] rounded-tr-3xl sm:rounded-tr-[2.5rem] transition-colors duration-500 ${scanState === 'denied' ? 'border-red-400' : scanState === 'granted' ? 'border-green-400' : 'border-white'}`}></div>
          <div className={`absolute bottom-0 left-0 w-8 h-8 sm:w-12 sm:h-12 border-b-[3px] border-l-[3px] rounded-bl-3xl sm:rounded-bl-[2.5rem] transition-colors duration-500 ${scanState === 'denied' ? 'border-red-400' : scanState === 'granted' ? 'border-green-400' : 'border-white'}`}></div>
          <div className={`absolute bottom-0 right-0 w-8 h-8 sm:w-12 sm:h-12 border-b-[3px] border-r-[3px] rounded-br-3xl sm:rounded-br-[2.5rem] transition-colors duration-500 ${scanState === 'denied' ? 'border-red-400' : scanState === 'granted' ? 'border-green-400' : 'border-white'}`}></div>

          {/* Center Scan Area */}
          <div className="absolute inset-4 rounded-xl overflow-hidden flex items-center justify-center">
            
            {/* LOGO INSIDE SCANNER FRAME */}
            <img 
              src={LOGO_URL} 
              alt="A Birthday To Remember" 
              className="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-[65%] sm:w-[70%] h-auto object-contain drop-shadow-[0_10px_20px_rgba(0,0,0,0.8)] opacity-25 pointer-events-none" 
            />

            {scanState === 'idle' && (
              <Barcode className="w-16 h-16 sm:w-24 sm:h-24 text-white/30 font-light relative z-10" strokeWidth={1} />
            )}

            {(scanState === 'scanning' || scanState === 'verifying') && (
              <div className="absolute top-0 left-0 w-full h-[2px] bg-white shadow-[0_0_20px_4px_rgba(255,255,255,0.6)] animate-[scan-laser-smooth_2.5s_ease-in-out_infinite] z-20"></div>
            )}

            {scanState === 'verifying' && (
              <div className="flex flex-col items-center opacity-80 animate-pulse relative z-20">
                <div className="w-6 h-6 sm:w-8 sm:h-8 border-2 border-white/20 border-t-white rounded-full animate-spin mb-2 sm:mb-3"></div>
                <p className="text-white text-[10px] sm:text-xs font-medium tracking-widest uppercase shadow-black drop-shadow-md">Verifying</p>
              </div>
            )}

            {scanState === 'granted' && (
              <div className="flex flex-col items-center animate-[pop-in_0.4s_ease-out] relative z-20">
                <div className="w-12 h-12 sm:w-16 sm:h-16 bg-green-500 rounded-full flex items-center justify-center mb-2 sm:mb-3 shadow-[0_0_30px_rgba(34,197,94,0.4)]">
                  <Check className="w-6 h-6 sm:w-8 sm:h-8 text-white" strokeWidth={3} />
                </div>
              </div>
            )}

            {scanState === 'denied' && (
              <div className="flex flex-col items-center animate-[shake_0.4s_ease-in-out] relative z-20">
                <div className="w-12 h-12 sm:w-16 sm:h-16 bg-red-500 rounded-full flex items-center justify-center mb-2 sm:mb-3 shadow-[0_0_30px_rgba(239,68,68,0.4)]">
                  <X className="w-6 h-6 sm:w-8 sm:h-8 text-white" strokeWidth={3} />
                </div>
              </div>
            )}
          </div>
        </div>

        {/* Bottom Actions Section */}
        <div className="w-full mt-auto mb-2">
          {/* Manual Entry Form */}
          <div className="w-full bg-white/10 backdrop-blur-2xl border border-white/10 rounded-[2rem] p-4 sm:p-5 shadow-2xl flex flex-col">
            <form onSubmit={handleAuthentication} className="flex flex-col space-y-3">
              <input 
                type="text" 
                value={inputCode}
                onChange={(e) => setInputCode(e.target.value.toUpperCase())}
                disabled={scanState !== 'idle' && scanState !== 'denied'}
                placeholder="ENTER CODE MANUALLY"
                className="w-full bg-white/5 border border-white/10 rounded-2xl px-4 py-3 sm:py-4 text-center text-white text-xs sm:text-sm tracking-[0.2em] focus:outline-none focus:ring-2 focus:ring-white/30 focus:bg-white/10 placeholder-white/30 transition-all disabled:opacity-50"
              />
              
              <button 
                type="submit"
                disabled={(scanState !== 'idle' && scanState !== 'denied') || inputCode.length < 5}
                className={`w-full py-3 sm:py-4 rounded-2xl text-xs sm:text-sm font-medium tracking-wide transition-all duration-300 flex items-center justify-center space-x-2
                  ${(scanState === 'idle' || scanState === 'denied') && inputCode.length >= 5 ? 'bg-white text-black hover:bg-gray-200 hover:scale-[0.98]' : 
                    scanState === 'granted' ? 'bg-green-500 text-white' :
                    'bg-white/10 text-white/40 cursor-not-allowed'}`}
              >
                <span>
                  {scanState === 'granted' ? 'Access Granted' : 
                   scanState === 'verifying' || scanState === 'scanning' ? 'Verifying...' :
                   'Authenticate'}
                </span>
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>
  );
};

// --- 3D CARTOON HOST COMPONENT ---
const CartoonHost = ({ onComplete }) => {
  const [dialogIndex, setDialogIndex] = useState(0);
  const dialogs = [
    "Welcome to the Grand Birthday Premiere! 🎉",
    "I'm Buddy! I've been getting the stage ready for you.",
    "We have a VERY special presentation lined up.",
    "Alright, sit back, relax, and enjoy the show!",
    "Curtains... OPEN! 🎬"
  ];

  useEffect(() => {
    if (dialogIndex < dialogs.length) {
      const timer = setTimeout(() => {
        setDialogIndex(d => d + 1);
      }, 3500); // 3.5 seconds per dialogue
      return () => clearTimeout(timer);
    } else {
      onComplete();
    }
  }, [dialogIndex, onComplete, dialogs.length]);

  return (
    <div className="absolute bottom-[28%] left-1/2 -translate-x-1/2 z-40 flex flex-col items-center animate-[drop-in_1s_ease-out_forwards]">
      
      {/* Speech Bubble */}
      <div className={`transition-opacity duration-300 ${dialogIndex < dialogs.length ? 'opacity-100' : 'opacity-0'} mb-6`}>
        <div className="bg-white text-gray-900 px-6 py-4 rounded-3xl relative shadow-2xl font-bold text-lg md:text-xl max-w-sm text-center border-4 border-gray-100">
          {dialogs[Math.min(dialogIndex, dialogs.length - 1)]}
          <div className="absolute -bottom-4 left-1/2 -translate-x-1/2 w-6 h-6 bg-white border-b-4 border-r-4 border-gray-100 rotate-45"></div>
        </div>
      </div>

      {/* 3D Character Body (Buddy 2.0 - Glossy Mascot) */}
      <div className="relative animate-[hover-bounce_3s_ease-in-out_infinite] flex flex-col items-center">
        
        {/* Floating Detached Hands */}
        <div className="absolute top-16 -left-12 w-10 h-12 bg-gradient-to-br from-white to-gray-400 rounded-[20px] shadow-lg animate-[float-hand-left_3s_ease-in-out_infinite] -rotate-12 border border-gray-100"></div>
        <div className="absolute top-16 -right-12 w-10 h-12 bg-gradient-to-br from-white to-gray-400 rounded-[20px] shadow-lg animate-[float-hand-right_3s_ease-in-out_infinite] rotate-12 border border-gray-100" style={{animationDelay: '1.5s'}}></div>

        {/* Main Capsule Body */}
        <div className="w-36 h-48 rounded-[70px] bg-gradient-to-br from-white via-gray-100 to-gray-400 shadow-[inset_-15px_-15px_30px_rgba(0,0,0,0.3),inset_10px_10px_20px_rgba(255,255,255,1),0_30px_40px_rgba(0,0,0,0.6)] relative flex flex-col items-center justify-start pt-8 border border-gray-200 z-10">
          
          {/* Cute Antenna */}
          <div className="absolute -top-8 w-2 h-8 bg-gradient-to-b from-gray-300 to-gray-500 rounded-t-full flex justify-center shadow-md z-0">
            <div className="absolute -top-3 w-5 h-5 bg-red-500 rounded-full shadow-[0_0_10px_rgba(239,68,68,0.8)] animate-pulse"></div>
          </div>

          {/* Glass Visor (Screen Face) */}
          <div className="w-28 h-16 bg-gradient-to-b from-gray-900 to-black rounded-[30px] shadow-[inset_0_5px_15px_rgba(0,0,0,1),0_2px_5px_rgba(255,255,255,0.8)] relative flex items-center justify-center space-x-4 overflow-hidden border-[3px] border-gray-700 z-10">
            {/* Glass glare effect */}
            <div className="absolute top-[-50%] left-[-20%] w-[150%] h-[100%] bg-gradient-to-b from-white/20 to-transparent -rotate-12"></div>
            {/* Secondary glass glare */}
            <div className="absolute bottom-[-20%] right-[-10%] w-[50%] h-[50%] bg-white/10 rounded-full blur-[2px]"></div>

            {/* LED Eyes */}
            <div className="w-5 h-7 bg-cyan-400 rounded-full shadow-[0_0_15px_3px_rgba(34,211,238,0.9)] animate-[blink_4s_infinite]"></div>

          <div className="mt-4 w-24 h-10 bg-gray-200 rounded-2xl shadow-[inset_0_2px_5px_rgba(0,0,0,0.2)] flex items-center justify-center space-x-3 border border-gray-300 z-20">
            <div className="w-3 h-3 rounded-full bg-green-400 shadow-[0_0_8px_rgba(74,222,128,0.8)] animate-pulse"></div>
            <div className="w-3 h-3 rounded-full bg-blue-400 shadow-[0_0_8px_rgba(96,165,250,0.8)]"></div>
            <div className="w-3 h-3 rounded-full bg-yellow-400 shadow-[0_0_8px_rgba(250,204,21,0.8)]"></div>
          </div>
        </div>

        {/* Floor Shadow (Grows and shrinks as he hovers) */}
        <div className="w-24 h-6 bg-black/60 blur-md rounded-[100%] mt-6 animate-[shadow-pulse_3s_ease-in-out_infinite]"></div>
      </div>
    </div>
  );
};

// --- MAIN APP COMPONENT ---
export default function App() {
  // App States: 'ticket', 'theater'
  const [appState, setAppState] = useState('ticket');

  // Theater States: 'idle', 'host', 'opening', 'main', 'outro', 'closing', 'finale'
  const [theaterState, setTheaterState] = useState('idle');

  // Updated Birthday Video URL (Converted to raw for streaming)
  const mainUrl = 'https://www.dropbox.com/scl/fi/0k0b2rltlppcyhqhgz3hi/A-Birthday-To-Remember.mp4?rlkey=xb4t2kxp5hkc7xumtbt9l3avd&st=g5om3zwo&raw=1';
  const mainRef = useRef(null);

  // Outro Video URL (Converted to raw for streaming)
  const outroUrl = 'https://www.dropbox.com/scl/fi/czt51n6800g3demc8mj9b/MVI_3001.mp4?rlkey=qq2xu1cmt60jlvm59uq6h8yn6&st=v21kwwtu&raw=1';
  const outroRef = useRef(null);

  // Handle the sequence
  const startShow = () => {
    // Prime the video for mobile autoplay restrictions
    if (mainRef.current) {
      mainRef.current.play().then(() => mainRef.current.pause()).catch(e => console.log("Autoplay prime skipped:", e));
    }
    setTheaterState('host');
  };

  const handleHostComplete = () => {
    setTheaterState('opening');
    setTimeout(() => {
      setTheaterState('main');
      if (mainRef.current) mainRef.current.play();
    }, 3500); // Wait for curtain animation
  };

  const handleMainEnd = () => {
    setTheaterState('outro');
    if (outroRef.current) outroRef.current.play();
  };

  const handleOutroEnd = () => {
    setTheaterState('closing');
    setTimeout(() => {
      setTheaterState('finale');
    }, 3500); // Wait for curtains to close completely
  };

  const resetShow = () => {
    setTheaterState('idle');
    setAppState('ticket'); // Go back to ticket screen on reset
  };

  // --- TICKET SCANNER VIEW ---
  if (appState === 'ticket') {
    return <TicketScanner onAccessGranted={() => setAppState('theater')} />;
  }

  // --- THEATER VIEW ---
  return (
    <div className="w-full h-screen bg-[#050505] overflow-hidden relative font-sans">
      
      {/* Dynamic Volumetric Spotlights */}
      <div className={`absolute top-0 left-1/4 w-32 h-[150vh] bg-yellow-100/20 blur-[80px] origin-top -rotate-[25deg] pointer-events-none transition-opacity duration-1000 z-30 ${theaterState === 'host' ? 'opacity-100' : 'opacity-0'}`}></div>
      <div className={`absolute top-0 right-1/4 w-32 h-[150vh] bg-yellow-100/20 blur-[80px] origin-top rotate-[25deg] pointer-events-none transition-opacity duration-1000 z-30 ${theaterState === 'host' ? 'opacity-100' : 'opacity-0'}`}></div>

      {/* Floating Dust Particles */}
      {(theaterState === 'idle' || theaterState === 'host') && <DustParticles />}

      {/* CAMERA ZOOM WRAPPER */}
      <div className={`absolute inset-0 w-full h-full transition-transform duration-[4000ms] ease-in-out ${(theaterState === 'main' || theaterState === 'outro') ? 'scale-[1.15] translate-y-[4vh]' : 'scale-100 translate-y-0'}`}>

        {/* 4D Breathing Camera Effect Wrapper */}
        <div className="absolute inset-0 w-full h-full animate-[breathe_10s_ease-in-out_infinite] perspective-[1200px] flex flex-col justify-center items-center pb-[10vh]">
          
          {/* Proscenium Arch (Ultra Realistic Gold/Wood frame around the stage) */}
          <div className="absolute top-[6vh] w-[94vw] max-w-[1350px] aspect-video border-[30px] border-[#2a1b12] rounded-t-[40px] shadow-[0_50px_150px_rgba(0,0,0,1)] z-0 flex justify-between px-[-30px]"
             style={{
               backgroundImage: 'linear-gradient(45deg, #180d06 0%, #3d2516 40%, #52331f 50%, #3d2516 60%, #180d06 100%)',
               boxShadow: 'inset 0 0 50px rgba(0,0,0,0.8), 0 30px 100px rgba(0,0,0,1)'
             }}
        >
          {/* Grand Top Molding */}
          <div className="absolute -top-[30px] left-[-30px] right-[-30px] h-[30px] bg-gradient-to-r from-yellow-800 via-yellow-500 to-yellow-800 border-b-[4px] border-[#2a1b12] rounded-t-[10px] shadow-lg flex items-center justify-center">
            <div className="w-[80%] h-[10px] bg-yellow-900/40 rounded-full blur-[1px]"></div>
          </div>
          {/* Inner Gold Rim */}
          <div className="absolute inset-0 border-[12px] border-yellow-600/80 rounded-t-xl shadow-[inset_0_0_20px_rgba(0,0,0,0.9)]" style={{backgroundImage: 'repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(255,255,255,0.1) 10px, rgba(255,255,255,0.1) 20px)'}}></div>
        </div>

        >
          
          {/* Main Video Screen (NO CONTROLS) */}
          <video 
            ref={mainRef}
            src={mainUrl}
            className={`absolute inset-0 w-full h-full object-cover z-0 transition-opacity duration-[2000ms] ${theaterState === 'main' ? 'opacity-100' : 'opacity-0'}`}
            onEnded={handleMainEnd}

          {/* Outro Video Screen */}
          <video 
            ref={outroRef}
            src={outroUrl}
            className={`absolute inset-0 w-full h-full object-cover z-10 transition-opacity duration-[2000ms] ${theaterState === 'outro' ? 'opacity-100' : 'opacity-0 pointer-events-none'}`}

          >
            {/* Gold Fringe Bottom */}

            </div>
          </div>

          {/* Ultra Realistic Right Curtain */}
          <div 
            className="absolute top-0 right-0 h-[102%] w-[52%] z-20 origin-right transition-transform duration-[3000ms] ease-in-out"
            style={{
              backgroundImage: 'linear-gradient(-90deg, rgba(0,0,0,0.6) 0%, transparent 10%, rgba(0,0,0,0.6) 100%), repeating-linear-gradient(-90deg, #3a0000 0%, #6b0000 4%, #a00000 8%, #6b0000 12%, #3a0000 16%)',
              backgroundSize: '100% 100%, 250% 100%',
              boxShadow: 'inset 40px 0 80px rgba(0,0,0,0.8), -20px 0 30px rgba(0,0,0,0.6)',
              transform: (theaterState === 'opening' || theaterState === 'main' || theaterState === 'outro') ? 'scaleX(0.02) translateX(20px) skewY(2deg)' : 'scaleX(1) skewY(0deg)',

          >
            {/* Gold Fringe Bottom */}
            <div className="absolute bottom-0 w-full h-[4%] bg-gradient-to-b from-yellow-300 via-yellow-600 to-yellow-800 shadow-lg border-t border-yellow-200">
              <div className="w-full h-full opacity-60" style={{ backgroundImage: 'repeating-linear-gradient(90deg, transparent 0px, transparent 3px, rgba(0,0,0,0.7) 3px, rgba(0,0,0,0.7) 6px)' }}></div>
            </div>
          </div>

          {/* Center Start Button Overlay (Only visible when idle) */}
          {theaterState === 'idle' && (
            <div className="absolute inset-0 z-30 flex flex-col items-center justify-center bg-black/40 space-y-10 backdrop-blur-sm">
              
              {/* THEATER IDLE LOGO */}
              <img 
                src={LOGO_URL} 
                alt="A Birthday To Remember" 
                className="w-[40%] max-w-[200px] object-contain drop-shadow-[0_20px_50px_rgba(0,0,0,0.8)] animate-[hover-bounce_4s_ease-in-out_infinite]" 
              />
              
              <button 
                onClick={startShow}
                className="group relative px-10 py-5 bg-gradient-to-b from-red-600 to-red-900 border-2 border-red-400 hover:from-red-500 hover:to-red-800 text-white text-2xl md:text-4xl font-extrabold rounded-full shadow-[0_0_50px_rgba(220,38,38,0.8)] transform transition-all hover:scale-110 active:scale-95 flex items-center space-x-4 overflow-hidden"
              >
                <div className="absolute inset-0 w-full h-full bg-gradient-to-r from-transparent via-white/30 to-transparent -translate-x-full group-hover:animate-[shimmer_1.5s_infinite]"></div>
                <Play className="w-10 h-10 fill-current" />
                <span className="drop-shadow-md">START SHOW</span>
              </button>
            </div>
          )}

          {/* Finale Overlay */}
          {theaterState === 'finale' && (
            <div className="absolute inset-0 z-40 flex flex-col items-center justify-center bg-black/95 backdrop-blur-md text-center p-8">
              
              {/* THEATER FINALE LOGO */}
              <img 
                src={LOGO_URL} 
                alt="A Birthday To Remember" 
                className="w-[35%] max-w-[180px] object-contain mb-8 drop-shadow-[0_0_40px_rgba(255,255,255,0.1)]"
                style={{ opacity: 0, animation: 'fade-in 2s ease-out forwards' }}
              />

              <h1 
                className="text-2xl md:text-3xl lg:text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-yellow-300 via-red-400 to-purple-500 mb-8 shadow-black drop-shadow-2xl"
                style={{ opacity: 0, animation: 'fade-in 2s ease-out 1s forwards' }}
              >
                THANK YOU FOR WATCHING!<br/>SEE YOU NEXT YEAR!
              </h1>
              
              <div 
                className="flex flex-col items-center"
                style={{ opacity: 0, animation: 'fade-in 2s ease-out 2.5s forwards' }}
              >
                <p className="text-lg text-cyan-400 mb-6 font-mono tracking-widest uppercase">Next Premiere In:</p>
                
                <Countdown targetDate="2027-04-27T00:00:00" />
                
                <button 
                  onClick={resetShow}
                  className="mt-12 px-8 py-4 bg-white/10 hover:bg-white/20 text-white rounded-full border border-white/30 backdrop-blur-lg transition flex items-center space-x-3 text-lg"
                >
                  <Settings className="w-5 h-5" />
                  <span>Reset Experience</span>
                </button>
              </div>

            </div>
          )}

        </div>

        {/* 3D Cartoon Host (Rendered strictly when in 'host' state) */}
        {theaterState === 'host' && <CartoonHost onComplete={handleHostComplete} />}

        {/* --- 3D WOODEN STAGE FLOOR (Max Realism) --- */}
        <div className="relative w-[96vw] max-w-[1380px] h-[35vh] z-20 origin-top flex flex-col drop-shadow-[0_20px_50px_rgba(0,0,0,1)]"
             style={{
               transform: 'rotateX(76deg) translateY(-12px)',
               transformStyle: 'preserve-3d'
             }}>
            
            {/* Ambient Occlusion / Corner Shadow where stage meets wall */}
            <div className="absolute top-0 left-0 w-full h-[80px] bg-gradient-to-b from-black via-black/90 to-transparent z-30 pointer-events-none"></div>

            {/* Wood Surface */}
            <div className="w-full h-full border-t-[10px] border-[#080402] relative overflow-hidden"
                 style={{
                   backgroundImage: `
                     linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.2) 30%, rgba(0,0,0,0.95) 100%),
                     repeating-linear-gradient(90deg, #30170a 0px, #30170a 35px, #1a0c04 35px, #1a0c04 38px, #241107 38px, #241107 70px, #120803 70px, #120803 73px)
                   `,
                   boxShadow: (theaterState === 'main' || theaterState === 'outro') ? 'inset 0 40px 100px rgba(255,255,255,0.08)' : 'inset 0 60px 200px rgba(0,0,0,1)'
                 }}>
                 
                 {/* Stage Texture details (grains and nails) */}
                 <div className="absolute inset-0 opacity-40 mix-blend-multiply" style={{ backgroundImage: 'url("data:image/svg+xml,%3Csvg viewBox=\'0 0 200 200\' xmlns=\'http://www.w3.org/2000/svg\'%3E%3Cfilter id=\'noiseFilter\'%3E%3CfeTurbulence type=\'fractalNoise\' baseFrequency=\'0.9\' numOctaves=\'4\' stitchTiles=\'stitch\'/%3E%3C/filter%3E%3Crect width=\'100%25\' height=\'100%25\' filter=\'url(%23noiseFilter)\'/%3E%3C/svg%3E")' }}></div>
                 <div className="absolute inset-0 opacity-30" style={{ backgroundImage: 'repeating-radial-gradient(circle at 17.5px 20px, #000 0, #000 2px, transparent 3px, transparent 100px)', backgroundSize: '35px 80px' }}></div>
                 
                 {/* Theatrical Footlights (Metallic Housing) */}
                 <div className="absolute top-6 left-0 w-full flex justify-between px-[8%] pointer-events-none z-10">
                   {[...Array(11)].map((_,i) => (
                     <div key={i} className="relative w-14 h-10 bg-gradient-to-b from-gray-600 to-gray-900 rounded-t-[20px] border-b-[8px] border-[#0a0502] flex justify-center shadow-[0_15px_30px_rgba(0,0,0,1),inset_0_2px_5px_rgba(255,255,255,0.3)]">
                       {/* Light Bulb */}
                       <div className="absolute bottom-1 w-7 h-6 rounded-t-full bg-gradient-to-b from-yellow-100 to-yellow-400"
                            style={{
                              boxShadow: (theaterState === 'idle' || theaterState === 'host' || theaterState === 'finale') ? '0 -10px 50px 25px rgba(255, 230, 120, 0.9), inset 0 0 10px white' : '0 0 5px 2px rgba(255, 200, 50, 0.1)',
                              transition: 'box-shadow 1s ease'
                            }}
                       ></div>
                       {/* Floor Reflection */}
                       <div className="absolute -bottom-8 w-20 h-16 bg-yellow-400/20 blur-[15px] rounded-full"
                            style={{ opacity: (theaterState === 'idle' || theaterState === 'host' || theaterState === 'finale') ? 1 : 0, transition: 'opacity 1s ease' }}></div>
                     </div>
                   ))}
                 </div>
            </div>
            
            {/* Stage Lip (Front Edge of the Stage) */}
            <div className="absolute bottom-0 w-full h-[90px] bg-[#1a0e08] border-t-[6px] border-[#3a1f10] origin-top flex flex-col justify-start overflow-hidden shadow-[0_40px_80px_rgba(0,0,0,1)]"
                 style={{ transform: 'rotateX(-76deg) translateY(100%)', transformOrigin: 'bottom' }}>
                 {/* Fancy Gold Trim on the stage lip */}
                 <div className="w-full h-[8px] bg-gradient-to-r from-yellow-900 via-yellow-400 to-yellow-900 border-b-2 border-yellow-950 shadow-md"></div>
                 {/* Velvet Lip Padding */}
                 <div className="w-full h-full opacity-60" style={{ backgroundImage: 'linear-gradient(to bottom, #4a0000, #1a0000), repeating-linear-gradient(90deg, transparent 0px, transparent 40px, rgba(0,0,0,0.8) 40px, rgba(0,0,0,0.8) 48px)' }}></div>
            </div>
        </div>

      </div>

      {/* 4D Elements: Foreground Seats Silhouette (Ultra Details) */}
      <div className="absolute bottom-0 left-0 w-full h-[28vh] z-40 pointer-events-none flex justify-around items-end overflow-hidden opacity-[0.98] pb-[-2vh] drop-shadow-[0_-15px_30px_rgba(0,0,0,1)]">

          <div key={i} className="relative w-[180px] h-[160px] flex-shrink-0 mx-[-10px] flex justify-center">
            {/* Seat Back (Plush Velvet) */}
            <div className="absolute bottom-0 w-[140px] h-full bg-gradient-to-t from-[#020202] to-[#1a0505] rounded-t-[50px] shadow-[inset_0_20px_50px_rgba(0,0,0,1),inset_0_2px_8px_rgba(255,255,255,0.08)] border-t border-red-950/30">
              {/* Velvet stitch lines */}
              <div className="absolute inset-0 flex justify-evenly px-4">
                 <div className="w-[2px] h-full bg-black/40"></div>
                 <div className="w-[2px] h-full bg-black/40"></div>
              </div>
            </div>
            {/* Seat Headrest */}
            <div className="absolute top-[-30px] w-[110px] h-[70px] bg-gradient-to-b from-[#1f0707] to-[#0a0202] rounded-[35px] border-t border-red-900/40 shadow-[0_15px_25px_rgba(0,0,0,0.95),inset_0_5px_10px_rgba(255,255,255,0.05)]"></div>

          </div>
        ))}

      </div> {/* END OF CAMERA ZOOM WRAPPER */}

      <style dangerouslySetInnerHTML={{__html: `
        @keyframes scan-laser-smooth {
          0% { top: 5%; opacity: 0; }
          15% { opacity: 1; }
          85% { opacity: 1; }
          100% { top: 95%; opacity: 0; }

          0% { opacity: 0; transform: translateY(-20px) translateX(-50%); }

          0% { opacity: 0; transform: scale(0.8); }

          100% { opacity: 1; transform: scale(1); }

          0%, 100% { transform: translateX(0); }

          40%, 80% { transform: translateX(5px); }

          0% { transform: translateY(0) rotate(0deg); }
          100% { transform: translateY(-100vh) rotate(360deg); }

        @keyframes breathe {
          0%, 100% { transform: translateY(0px) scale(1); }
          50% { transform: translateY(-15px) scale(1.01); }
        }
        @keyframes shimmer {
          100% { transform: translateX(100%); }

          0% { opacity: 0; }

          0%, 100% { transform: translateY(0) rotate(-12deg); }
          50% { transform: translateY(-10px) rotate(-20deg); }
        }
        @keyframes float-hand-right {
          0%, 100% { transform: translateY(0) rotate(12deg); }
          50% { transform: translateY(-10px) rotate(20deg); }
        }
        @keyframes shadow-pulse {
          0%, 100% { transform: scale(1); opacity: 0.6; }
          50% { transform: scale(0.8); opacity: 0.2; }
        }
      `}} />
    </div>
  );
}
ReactDOM.createRoot(
  document.getElementById("root")
).render(
  <App />
);

</script>
