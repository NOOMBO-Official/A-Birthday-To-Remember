<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>A Birthday To Remember</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    @keyframes scan-laser-smooth {
      0% { top: 5%; opacity: 0; }
      15% { opacity: 1; }
      85% { opacity: 1; }
      100% { top: 95%; opacity: 0; }
    }
    @keyframes fade-in-down {
      0% { opacity: 0; transform: translateY(-20px) translateX(-50%); }
      100% { opacity: 1; transform: translateY(0) translateX(-50%); }
    }
    @keyframes pop-in {
      0% { opacity: 0; transform: scale(0.8); }
      50% { transform: scale(1.1); }
      100% { opacity: 1; transform: scale(1); }
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-5px); }
      40%, 80% { transform: translateX(5px); }
    }
    @keyframes float-dust {
      0% { transform: translateY(0) rotate(0deg); }
      100% { transform: translateY(-100vh) rotate(360deg); }
    }
    @keyframes breathe {
      0%, 100% { transform: translateY(0px) scale(1); }
      50% { transform: translateY(-15px) scale(1.01); }
    }
    @keyframes shimmer {
      100% { transform: translateX(100%); }
    }
    @keyframes fade-in {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }
    @keyframes drop-in {
      0% { transform: translate(-50%, -100vh) scale(0.5) rotate(10deg); opacity: 0; }
      60% { transform: translate(-50%, 20px) scale(1.1) rotate(-5deg); opacity: 1; }
      80% { transform: translate(-50%, -10px) scale(0.95) rotate(2deg); }
      100% { transform: translate(-50%, 0) scale(1) rotate(0); opacity: 1; }
    }
    @keyframes hover-bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }
    @keyframes blink {
      0%, 46%, 48%, 50%, 100% { transform: scaleY(1); }
      47%, 49% { transform: scaleY(0.1); }
    }
    @keyframes float-hand-left {
      0%, 100% { transform: translateY(0) rotate(-12deg); }
      50% { transform: translateY(-10px) rotate(-20deg); }
    }
    @keyframes float-hand-right {
      0%, 100% { transform: translateY(0) rotate(12deg); }
      50% { transform: translateY(-10px) rotate(20deg); }
    }
    @keyframes shadow-pulse {
      0%, 100% { transform: scale(1); opacity: 0.6; }
      50% { transform: scale(0.8); opacity: 0.2; }
    }

    body {
      margin: 0;
      overflow: hidden;
      background-color: #000;
    }
    
    /* Ensure hardware acceleration for 3D elements */
    .transform-style-preserve-3d {
      transform-style: preserve-3d;
    }
  </style>
</head>
<body>

  <!-- ================= TICKET SCANNER VIEW ================= -->
  <div id="ticket-view" class="fixed inset-0 w-full h-[100dvh] bg-black overflow-hidden font-sans z-50 transition-colors duration-700 flex flex-col items-center">
    
    <!-- DEVELOPER SETTINGS OVERLAY -->
    <div id="dev-overlay" class="hidden fixed top-6 left-1/2 -translate-x-1/2 z-[60] w-[90%] max-w-sm bg-white/10 backdrop-blur-2xl border border-white/20 p-6 rounded-[2rem] shadow-2xl flex-col items-center animate-[fade-in-down_0.4s_ease-out]">
      <div class="flex items-center space-x-2 mb-2 opacity-70">
        <i data-lucide="terminal" class="w-5 h-5 text-white"></i>
        <h2 class="text-white font-medium text-sm tracking-wider">DEV OVERRIDE</h2>
      </div>
      <p class="text-[10px] text-white/50 mb-5 text-center">VALID VIP BARCODE GENERATED</p>
      
      <!-- ACTUAL GENERATED BARCODE -->
      <div class="bg-white rounded-2xl p-2 w-full shadow-2xl flex items-center justify-center py-4 px-6">
        <div id="dev-barcode-container" class="flex items-stretch h-16 sm:h-20 w-full justify-center"></div>
      </div>
      <p id="dev-secret-text" class="text-white/80 font-mono tracking-[0.3em] mt-4 text-sm font-semibold"></p>

      <button id="download-btn" class="mt-5 w-full py-3 bg-white/10 hover:bg-white/20 border border-white/20 rounded-xl text-white font-medium text-xs tracking-wider transition-all flex items-center justify-center space-x-2 active:scale-95 cursor-pointer">
        <i data-lucide="download" class="w-4 h-4"></i>
        <span>DOWNLOAD IMAGE</span>
      </button>
    </div>

    <!-- Live Camera Feed -->
    <video id="camera-feed" autoplay playsinline muted class="absolute inset-0 w-full h-full object-cover transition-all duration-[2000ms] ease-out opacity-0 scale-110 blur-xl"></video>
    
    <!-- Camera Error State -->
    <div id="camera-error" class="hidden absolute inset-0 w-full h-full flex items-center justify-center bg-zinc-900 opacity-50">
      <i data-lucide="camera" class="w-24 h-24 text-zinc-700"></i>
    </div>

    <div class="absolute inset-0 bg-gradient-to-t from-black via-black/40 to-black/20 pointer-events-none"></div>

    <!-- Main UI Container -->
    <div class="relative z-10 w-full h-full max-w-md mx-auto flex flex-col items-center justify-between py-6 px-4 sm:px-6">
      
      <!-- Header -->
      <div class="flex flex-col items-center mt-4 sm:mt-8 space-y-3 w-full max-w-[280px]">
        <div class="w-10 h-10 sm:w-12 sm:h-12 rounded-2xl bg-white/10 backdrop-blur-xl border border-white/20 flex items-center justify-center shadow-xl">
          <i data-lucide="camera" class="w-5 h-5 sm:w-6 sm:h-6 text-white"></i>
        </div>
        <h1 class="text-lg sm:text-xl font-medium text-white tracking-wide">Scan Ticket</h1>
        <p class="text-[10px] sm:text-xs text-white/60 font-light text-center">Position the barcode within the frame.</p>
      </div>

      <!-- Viewfinder -->
      <div class="relative w-[45vw] max-w-[220px] sm:max-w-[280px] aspect-square my-auto flex-shrink flex items-center justify-center">
        <!-- iOS Style Corners -->
        <div id="scanner-frame" class="absolute inset-0 transition-all duration-500 rounded-3xl sm:rounded-[2.5rem] border-white/30 border-[3px]" style="clip-path: polygon(0 0, 25% 0, 0 25%, 0 0, 75% 0, 100% 0, 100% 25%, 100% 0, 100% 75%, 100% 100%, 75% 100%, 100% 100%, 0 100%, 25% 100%, 0 100%, 0 75%);"></div>
        
        <!-- Corner Elements -->
        <div id="corner-tl" class="absolute top-0 left-0 w-8 h-8 sm:w-12 sm:h-12 border-t-[3px] border-l-[3px] rounded-tl-3xl sm:rounded-tl-[2.5rem] transition-colors duration-500 border-white"></div>
        <div id="corner-tr" class="absolute top-0 right-0 w-8 h-8 sm:w-12 sm:h-12 border-t-[3px] border-r-[3px] rounded-tr-3xl sm:rounded-tr-[2.5rem] transition-colors duration-500 border-white"></div>
        <div id="corner-bl" class="absolute bottom-0 left-0 w-8 h-8 sm:w-12 sm:h-12 border-b-[3px] border-l-[3px] rounded-bl-3xl sm:rounded-bl-[2.5rem] transition-colors duration-500 border-white"></div>
        <div id="corner-br" class="absolute bottom-0 right-0 w-8 h-8 sm:w-12 sm:h-12 border-b-[3px] border-r-[3px] rounded-br-3xl sm:rounded-br-[2.5rem] transition-colors duration-500 border-white"></div>

        <!-- Center Scan Area -->
        <div class="absolute inset-4 rounded-xl overflow-hidden flex items-center justify-center">
          
          <!-- LOGO INSIDE SCANNER FRAME -->
          <img 
            src="https://www.dropbox.com/scl/fi/zddc2wx1ffqste07xtolu/A-BIRTHDAY-TO-REMEMBER-LOGO.png?rlkey=ul9r223iaas275h9f6wfn1wq4&st=zx5g77eu&raw=1" 
            alt="A Birthday To Remember Logo" 
            class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-[65%] sm:w-[70%] h-auto object-contain drop-shadow-[0_10px_20px_rgba(0,0,0,0.8)] opacity-25 pointer-events-none z-0" 
          />

          <!-- Idle Icon -->
          <div id="scan-idle" class="flex items-center justify-center z-10">
            <i data-lucide="barcode" class="w-16 h-16 sm:w-24 sm:h-24 text-white/30 font-light relative z-10" stroke-width="1"></i>
          </div>

          <!-- Laser Line -->
          <div id="scan-laser" class="hidden absolute top-0 left-0 w-full h-[2px] bg-white shadow-[0_0_20px_4px_rgba(255,255,255,0.6)] animate-[scan-laser-smooth_2.5s_ease-in-out_infinite] z-20"></div>

          <!-- Verifying UI -->
          <div id="scan-verifying" class="hidden flex-col items-center opacity-80 animate-pulse relative z-20">
            <div class="w-6 h-6 sm:w-8 sm:h-8 border-2 border-white/20 border-t-white rounded-full animate-spin mb-2 sm:mb-3"></div>
            <p class="text-white text-[10px] sm:text-xs font-medium tracking-widest uppercase shadow-black drop-shadow-md">Verifying</p>
          </div>

          <!-- Granted UI -->
          <div id="scan-granted" class="hidden flex-col items-center animate-[pop-in_0.4s_ease-out] relative z-20">
            <div class="w-12 h-12 sm:w-16 sm:h-16 bg-green-500 rounded-full flex items-center justify-center mb-2 sm:mb-3 shadow-[0_0_30px_rgba(34,197,94,0.4)]">
              <i data-lucide="check" class="w-6 h-6 sm:w-8 sm:h-8 text-white" stroke-width="3"></i>
            </div>
          </div>

          <!-- Denied UI -->
          <div id="scan-denied" class="hidden flex-col items-center animate-[shake_0.4s_ease-in-out] relative z-20">
            <div class="w-12 h-12 sm:w-16 sm:h-16 bg-red-500 rounded-full flex items-center justify-center mb-2 sm:mb-3 shadow-[0_0_30px_rgba(239,68,68,0.4)]">
              <i data-lucide="x" class="w-6 h-6 sm:w-8 sm:h-8 text-white" stroke-width="3"></i>
            </div>
          </div>
        </div>
      </div>

      <!-- Bottom Form -->
      <div class="w-full mt-auto mb-2">
        <div class="w-full bg-white/10 backdrop-blur-2xl border border-white/10 rounded-[2rem] p-4 sm:p-5 shadow-2xl flex flex-col transform transition-transform">
          <form id="auth-form" class="flex flex-col space-y-3">
            <input 
              id="code-input"
              type="text" 
              placeholder="ENTER CODE MANUALLY"
              class="w-full bg-white/5 border border-white/10 rounded-2xl px-4 py-3 sm:py-4 text-center text-white text-xs sm:text-sm tracking-[0.2em] focus:outline-none focus:ring-2 focus:ring-white/30 focus:bg-white/10 placeholder-white/30 transition-all disabled:opacity-50 uppercase"
            />
            <button 
              id="auth-btn"
              type="submit"
              disabled
              class="w-full py-3 sm:py-4 rounded-2xl text-xs sm:text-sm font-medium tracking-wide transition-all duration-300 flex items-center justify-center space-x-2 bg-white/10 text-white/40 cursor-not-allowed"
            >
              <span id="auth-btn-text">Authenticate</span>
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>


  <!-- ================= THEATER VIEW ================= -->
  <div id="theater-view" class="hidden w-full h-[100dvh] bg-[#050505] overflow-hidden relative font-sans">
    
    <!-- Dynamic Spotlights -->
    <div id="spotlight-left" class="absolute top-0 left-1/4 w-32 h-[150vh] bg-yellow-100/20 blur-[80px] origin-top -rotate-[25deg] pointer-events-none transition-opacity duration-1000 z-30 opacity-0"></div>
    <div id="spotlight-right" class="absolute top-0 right-1/4 w-32 h-[150vh] bg-yellow-100/20 blur-[80px] origin-top rotate-[25deg] pointer-events-none transition-opacity duration-1000 z-30 opacity-0"></div>

    <!-- Dust Particles -->
    <div id="dust-container" class="absolute inset-0 z-20 pointer-events-none overflow-hidden transition-opacity duration-1000"></div>

    <!-- CAMERA ZOOM WRAPPER -->
    <div id="camera-zoom" class="absolute inset-0 w-full h-full transition-transform duration-[4000ms] ease-in-out scale-100 translate-y-0">

      <!-- 4D Breathing Effect -->
      <div class="absolute inset-0 w-full h-full animate-[breathe_10s_ease-in-out_infinite] perspective-[1200px] flex flex-col justify-center items-center pb-[10vh]">
        
        <!-- Proscenium Arch -->
        <div class="absolute top-[6vh] w-[94vw] max-w-[1350px] aspect-video border-[30px] border-[#2a1b12] rounded-t-[40px] shadow-[0_50px_150px_rgba(0,0,0,1)] z-0 flex justify-between px-[-30px]" style="background-image: linear-gradient(45deg, #180d06 0%, #3d2516 40%, #52331f 50%, #3d2516 60%, #180d06 100%); box-shadow: inset 0 0 50px rgba(0,0,0,0.8), 0 30px 100px rgba(0,0,0,1);">
          <div class="absolute -top-[30px] left-[-30px] right-[-30px] h-[30px] bg-gradient-to-r from-yellow-800 via-yellow-500 to-yellow-800 border-b-[4px] border-[#2a1b12] rounded-t-[10px] shadow-lg flex items-center justify-center">
            <div class="w-[80%] h-[10px] bg-yellow-900/40 rounded-full blur-[1px]"></div>
          </div>
          <div class="absolute inset-0 border-[12px] border-yellow-600/80 rounded-t-xl shadow-[inset_0_0_20px_rgba(0,0,0,0.9)]" style="background-image: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(255,255,255,0.1) 10px, rgba(255,255,255,0.1) 20px);"></div>
        </div>

        <!-- The Screen Container -->
        <div id="screen-container" class="relative w-[85vw] max-w-[1200px] aspect-video bg-black rounded-sm overflow-hidden transform-style-preserve-3d transition-all duration-1000 z-10 mt-[4vh] shadow-[0_-20px_150px_rgba(0,0,0,0.9)]">
          
          <!-- Main Video Screen -->
          <video id="main-video" src="https://www.dropbox.com/scl/fi/0k0b2rltlppcyhqhgz3hi/A-Birthday-To-Remember.mp4?rlkey=xb4t2kxp5hkc7xumtbt9l3avd&st=g5om3zwo&raw=1" class="absolute inset-0 w-full h-full object-cover z-0 transition-opacity duration-[2000ms] opacity-0" playsinline></video>

          <!-- Outro Video Screen -->
          <video id="outro-video" src="https://www.dropbox.com/scl/fi/czt51n6800g3demc8mj9b/MVI_3001.mp4?rlkey=qq2xu1cmt60jlvm59uq6h8yn6&st=v21kwwtu&raw=1" class="absolute inset-0 w-full h-full object-cover z-10 transition-opacity duration-[2000ms] opacity-0 pointer-events-none" playsinline></video>

          <!-- Left Curtain -->
          <div id="left-curtain" class="absolute top-0 left-0 h-[102%] w-[52%] z-20 origin-left transition-transform duration-[3000ms] ease-in-out" style="background-image: linear-gradient(90deg, rgba(0,0,0,0.6) 0%, transparent 10%, rgba(0,0,0,0.6) 100%), repeating-linear-gradient(90deg, #3a0000 0%, #6b0000 4%, #a00000 8%, #6b0000 12%, #3a0000 16%); background-size: 100% 100%, 250% 100%; box-shadow: inset -40px 0 80px rgba(0,0,0,0.8), 20px 0 30px rgba(0,0,0,0.6); transform: scaleX(1) skewY(0deg); border-right: 6px solid #2a0000;">
            <div class="absolute bottom-0 w-full h-[4%] bg-gradient-to-b from-yellow-300 via-yellow-600 to-yellow-800 shadow-lg border-t border-yellow-200">
              <div class="w-full h-full opacity-60" style="background-image: repeating-linear-gradient(90deg, transparent 0px, transparent 3px, rgba(0,0,0,0.7) 3px, rgba(0,0,0,0.7) 6px);"></div>
            </div>
          </div>

          <!-- Right Curtain -->
          <div id="right-curtain" class="absolute top-0 right-0 h-[102%] w-[52%] z-20 origin-right transition-transform duration-[3000ms] ease-in-out" style="background-image: linear-gradient(-90deg, rgba(0,0,0,0.6) 0%, transparent 10%, rgba(0,0,0,0.6) 100%), repeating-linear-gradient(-90deg, #3a0000 0%, #6b0000 4%, #a00000 8%, #6b0000 12%, #3a0000 16%); background-size: 100% 100%, 250% 100%; box-shadow: inset 40px 0 80px rgba(0,0,0,0.8), -20px 0 30px rgba(0,0,0,0.6); transform: scaleX(1) skewY(0deg); border-left: 6px solid #2a0000;">
            <div class="absolute bottom-0 w-full h-[4%] bg-gradient-to-b from-yellow-300 via-yellow-600 to-yellow-800 shadow-lg border-t border-yellow-200">
              <div class="w-full h-full opacity-60" style="background-image: repeating-linear-gradient(90deg, transparent 0px, transparent 3px, rgba(0,0,0,0.7) 3px, rgba(0,0,0,0.7) 6px);"></div>
            </div>
          </div>

          <!-- Center Start Button Overlay -->
          <div id="start-overlay" class="absolute inset-0 z-30 flex flex-col items-center justify-center bg-black/40 space-y-10 backdrop-blur-sm">
            <img src="https://www.dropbox.com/scl/fi/zddc2wx1ffqste07xtolu/A-BIRTHDAY-TO-REMEMBER-LOGO.png?rlkey=ul9r223iaas275h9f6wfn1wq4&st=zx5g77eu&raw=1" alt="Logo" class="w-[40%] max-w-[200px] object-contain drop-shadow-[0_20px_50px_rgba(0,0,0,0.8)] animate-[hover-bounce_4s_ease-in-out_infinite]" />
            <button id="start-show-btn" class="group relative px-10 py-5 bg-gradient-to-b from-red-600 to-red-900 border-2 border-red-400 hover:from-red-500 hover:to-red-800 text-white text-2xl md:text-4xl font-extrabold rounded-full shadow-[0_0_50px_rgba(220,38,38,0.8)] transform transition-all hover:scale-110 active:scale-95 flex items-center space-x-4 overflow-hidden cursor-pointer">
              <div class="absolute inset-0 w-full h-full bg-gradient-to-r from-transparent via-white/30 to-transparent -translate-x-full group-hover:animate-[shimmer_1.5s_infinite]"></div>
              <i data-lucide="play" class="w-10 h-10 fill-current"></i>
              <span class="drop-shadow-md">START SHOW</span>
            </button>
          </div>

          <!-- Finale Overlay -->
          <div id="finale-overlay" class="hidden absolute inset-0 z-40 flex-col items-center justify-center bg-black/95 backdrop-blur-md text-center p-8">
            <img src="https://www.dropbox.com/scl/fi/zddc2wx1ffqste07xtolu/A-BIRTHDAY-TO-REMEMBER-LOGO.png?rlkey=ul9r223iaas275h9f6wfn1wq4&st=zx5g77eu&raw=1" alt="Logo" class="w-[35%] max-w-[180px] object-contain mb-8 drop-shadow-[0_0_40px_rgba(255,255,255,0.1)] opacity-0 animate-[fade-in_2s_ease-out_forwards]" />
            <h1 class="text-2xl md:text-3xl lg:text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-yellow-300 via-red-400 to-purple-500 mb-8 shadow-black drop-shadow-2xl opacity-0 animate-[fade-in_2s_ease-out_1s_forwards]">
              THANK YOU FOR WATCHING!<br/>SEE YOU NEXT YEAR!
            </h1>
            <div class="flex flex-col items-center opacity-0 animate-[fade-in_2s_ease-out_2.5s_forwards]">
              <p class="text-lg text-cyan-400 mb-6 font-mono tracking-widest uppercase">Next Premiere In:</p>
              
              <!-- Countdown -->
              <div id="countdown-container" class="flex justify-center items-center">
                <!-- Timers inserted via JS -->
              </div>
              
              <button id="reset-btn" class="mt-12 px-8 py-4 bg-white/10 hover:bg-white/20 text-white rounded-full border border-white/30 backdrop-blur-lg transition flex items-center space-x-3 text-lg cursor-pointer">
                <i data-lucide="settings" class="w-5 h-5"></i>
                <span>Reset Experience</span>
              </button>
            </div>
          </div>

        </div>

        <!-- 3D Cartoon Host (Buddy) -->
        <div id="cartoon-host" class="hidden absolute bottom-[28%] left-1/2 -translate-x-1/2 z-40 flex-col items-center animate-[drop-in_1s_ease-out_forwards]">
          <!-- Speech Bubble -->
          <div id="speech-bubble" class="transition-opacity duration-300 opacity-100 mb-6">
            <div class="bg-white text-gray-900 px-6 py-4 rounded-3xl relative shadow-2xl font-bold text-lg md:text-xl max-w-sm text-center border-4 border-gray-100">
              <span id="dialogue-text">Welcome to the Grand Birthday Premiere! 🎉</span>
              <div class="absolute -bottom-4 left-1/2 -translate-x-1/2 w-6 h-6 bg-white border-b-4 border-r-4 border-gray-100 rotate-45"></div>
            </div>
          </div>

          <!-- Body -->
          <div class="relative animate-[hover-bounce_3s_ease-in-out_infinite] flex flex-col items-center">
            <div class="absolute top-16 -left-12 w-10 h-12 bg-gradient-to-br from-white to-gray-400 rounded-[20px] shadow-lg animate-[float-hand-left_3s_ease-in-out_infinite] -rotate-12 border border-gray-100"></div>
            <div class="absolute top-16 -right-12 w-10 h-12 bg-gradient-to-br from-white to-gray-400 rounded-[20px] shadow-lg animate-[float-hand-right_3s_ease-in-out_infinite] rotate-12 border border-gray-100" style="animation-delay: 1.5s;"></div>

            <div class="w-36 h-48 rounded-[70px] bg-gradient-to-br from-white via-gray-100 to-gray-400 shadow-[inset_-15px_-15px_30px_rgba(0,0,0,0.3),inset_10px_10px_20px_rgba(255,255,255,1),0_30px_40px_rgba(0,0,0,0.6)] relative flex flex-col items-center justify-start pt-8 border border-gray-200 z-10">
              <div class="absolute -top-8 w-2 h-8 bg-gradient-to-b from-gray-300 to-gray-500 rounded-t-full flex justify-center shadow-md z-0">
                <div class="absolute -top-3 w-5 h-5 bg-red-500 rounded-full shadow-[0_0_10px_rgba(239,68,68,0.8)] animate-pulse"></div>
              </div>
              <div class="w-28 h-16 bg-gradient-to-b from-gray-900 to-black rounded-[30px] shadow-[inset_0_5px_15px_rgba(0,0,0,1),0_2px_5px_rgba(255,255,255,0.8)] relative flex items-center justify-center space-x-4 overflow-hidden border-[3px] border-gray-700 z-10">
                <div class="absolute top-[-50%] left-[-20%] w-[150%] h-[100%] bg-gradient-to-b from-white/20 to-transparent -rotate-12"></div>
                <div class="absolute bottom-[-20%] right-[-10%] w-[50%] h-[50%] bg-white/10 rounded-full blur-[2px]"></div>
                <div class="w-5 h-7 bg-cyan-400 rounded-full shadow-[0_0_15px_3px_rgba(34,211,238,0.9)] animate-[blink_4s_infinite]"></div>
                <div class="w-5 h-7 bg-cyan-400 rounded-full shadow-[0_0_15px_3px_rgba(34,211,238,0.9)] animate-[blink_4s_infinite]"></div>
              </div>
              <div class="mt-5 relative z-20 flex items-center justify-center drop-shadow-[0_4px_4px_rgba(0,0,0,0.4)]">
                <div class="w-0 h-0 border-t-[10px] border-t-transparent border-l-[18px] border-l-red-600 border-b-[10px] border-b-transparent"></div>
                <div class="w-5 h-5 bg-red-700 rounded-full mx-[-5px] z-10 shadow-[inset_0_2px_4px_rgba(0,0,0,0.5),0_2px_4px_rgba(0,0,0,0.5)]"></div>
                <div class="w-0 h-0 border-t-[10px] border-t-transparent border-r-[18px] border-r-red-600 border-b-[10px] border-b-transparent"></div>
              </div>
              <div class="mt-4 w-24 h-10 bg-gray-200 rounded-2xl shadow-[inset_0_2px_5px_rgba(0,0,0,0.2)] flex items-center justify-center space-x-3 border border-gray-300 z-20">
                <div class="w-3 h-3 rounded-full bg-green-400 shadow-[0_0_8px_rgba(74,222,128,0.8)] animate-pulse"></div>
                <div class="w-3 h-3 rounded-full bg-blue-400 shadow-[0_0_8px_rgba(96,165,250,0.8)]"></div>
                <div class="w-3 h-3 rounded-full bg-yellow-400 shadow-[0_0_8px_rgba(250,204,21,0.8)]"></div>
              </div>
            </div>
            <div class="w-24 h-6 bg-black/60 blur-md rounded-[100%] mt-6 animate-[shadow-pulse_3s_ease-in-out_infinite]"></div>
          </div>
        </div>

        <!-- 3D WOODEN STAGE FLOOR -->
        <div class="relative w-[96vw] max-w-[1380px] h-[35vh] z-20 origin-top flex flex-col drop-shadow-[0_20px_50px_rgba(0,0,0,1)]" style="transform: rotateX(76deg) translateY(-12px); transform-style: preserve-3d;">
          <div class="absolute top-0 left-0 w-full h-[80px] bg-gradient-to-b from-black via-black/90 to-transparent z-30 pointer-events-none"></div>

          <div id="stage-surface" class="w-full h-full border-t-[10px] border-[#080402] relative overflow-hidden" style="background-image: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.2) 30%, rgba(0,0,0,0.95) 100%), repeating-linear-gradient(90deg, #30170a 0px, #30170a 35px, #1a0c04 35px, #1a0c04 38px, #241107 38px, #241107 70px, #120803 70px, #120803 73px); box-shadow: inset 0 60px 200px rgba(0,0,0,1);">
            <div class="absolute inset-0 opacity-40 mix-blend-multiply" style="background-image: url('data:image/svg+xml,%3Csvg viewBox=\'0 0 200 200\' xmlns=\'http://www.w3.org/2000/svg\'%3E%3Cfilter id=\'noiseFilter\'%3E%3CfeTurbulence type=\'fractalNoise\' baseFrequency=\'0.9\' numOctaves=\'4\' stitchTiles=\'stitch\'/%3E%3C/filter%3E%3Crect width=\'100%25\' height=\'100%25\' filter=\'url(%23noiseFilter)\'/%3E%3C/svg%3E')"></div>
            <div class="absolute inset-0 opacity-30" style="background-image: repeating-radial-gradient(circle at 17.5px 20px, #000 0, #000 2px, transparent 3px, transparent 100px); background-size: 35px 80px;"></div>
            
            <div id="footlights" class="absolute top-6 left-0 w-full flex justify-between px-[8%] pointer-events-none z-10">
              <!-- Footlights generated in JS -->
            </div>
          </div>
          
          <div class="absolute bottom-0 w-full h-[90px] bg-[#1a0e08] border-t-[6px] border-[#3a1f10] origin-top flex flex-col justify-start overflow-hidden shadow-[0_40px_80px_rgba(0,0,0,1)]" style="transform: rotateX(-76deg) translateY(100%); transform-origin: bottom;">
            <div class="w-full h-[8px] bg-gradient-to-r from-yellow-900 via-yellow-400 to-yellow-900 border-b-2 border-yellow-950 shadow-md"></div>
            <div class="w-full h-full opacity-60" style="background-image: linear-gradient(to bottom, #4a0000, #1a0000), repeating-linear-gradient(90deg, transparent 0px, transparent 40px, rgba(0,0,0,0.8) 40px, rgba(0,0,0,0.8) 48px);"></div>
          </div>
        </div>

      </div>

      <!-- Foreground Seats -->
      <div id="seats-container" class="absolute bottom-0 left-0 w-full h-[28vh] z-40 pointer-events-none flex justify-around items-end overflow-hidden opacity-[0.98] pb-[-2vh] drop-shadow-[0_-15px_30px_rgba(0,0,0,1)]">
        <!-- Seats generated in JS -->
      </div>
    </div>
    
    <!-- Confetti Canvas -->
    <canvas id="confetti-canvas" class="hidden absolute inset-0 z-50 pointer-events-none"></canvas>
  </div>

  <script>
    // --- GLOBAL VARIABLES & STATE ---
    const SECRET_CODE = (() => {
      const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
      const gen = (len) => Array.from({length: len}, () => chars[Math.floor(Math.random() * chars.length)]).join('');
      return `VIP-${gen(4)}`;
    })();

    let devMode = false;
    let confettiFrame = null;
    let countdownInterval = null;
    
    // --- UTILITY: LUCIDE ICONS ---
    lucide.createIcons();

    // --- SETUP: DUST PARTICLES ---
    const dustContainer = document.getElementById('dust-container');
    for (let i = 0; i < 40; i++) {
      const p = document.createElement('div');
      p.className = 'absolute bg-yellow-100/30 rounded-full animate-[float-dust_linear_infinite]';
      p.style.width = `${Math.random() * 4 + 1}px`;
      p.style.height = `${Math.random() * 4 + 1}px`;
      p.style.left = `${Math.random() * 100}%`;
      p.style.top = `${Math.random() * 100}%`;
      p.style.animationDuration = `${Math.random() * 10 + 10}s`;
      p.style.animationDelay = `-${Math.random() * 20}s`;
      p.style.opacity = Math.random() * 0.5 + 0.1;
      dustContainer.appendChild(p);
    }

    // --- SETUP: BARCODE GENERATOR ---
    function getBarcodePattern(value) {
      let pattern = [2, 1, 4, 1, 2, 2]; 
      for (let i = 0; i < value.length; i++) {
        const code = value.charCodeAt(i);
        pattern.push((code % 3) + 1);
        pattern.push((code % 2) + 1);
        pattern.push(((code * 2) % 3) + 1);
        pattern.push(1);
      }
      pattern.push(...[2, 2, 4, 1, 2]); 
      return pattern;
    }

    function renderDevBarcode() {
      const container = document.getElementById('dev-barcode-container');
      const pattern = getBarcodePattern(SECRET_CODE);
      pattern.forEach((width, i) => {
        const bar = document.createElement('div');
        bar.className = i % 2 === 0 ? "bg-black" : "bg-transparent";
        bar.style.width = `${width * 2.5}px`;
        container.appendChild(bar);
      });
      document.getElementById('dev-secret-text').innerText = SECRET_CODE;
    }
    renderDevBarcode();

    // --- SETUP: CAMERA ---
    const videoRef = document.getElementById('camera-feed');
    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
        videoRef.srcObject = stream;
        // Fade in camera
        videoRef.classList.remove('opacity-0', 'scale-110', 'blur-xl');
        videoRef.classList.add('opacity-40', 'scale-100', 'blur-sm');
      } catch (err) {
        console.error("Camera access denied", err);
        document.getElementById('camera-error').classList.remove('hidden');
        videoRef.classList.add('hidden');
      }
    }
    startCamera();

    // --- SETUP: FOREGROUND SEATS & FOOTLIGHTS ---
    const seatsContainer = document.getElementById('seats-container');
    const footlights = document.getElementById('footlights');
    const numSeats = Math.ceil(window.innerWidth / 180) + 2;
    for (let i = 0; i < numSeats; i++) {
      seatsContainer.innerHTML += `
        <div class="relative w-[180px] h-[160px] flex-shrink-0 mx-[-10px] flex justify-center">
          <div class="absolute bottom-0 w-[140px] h-full bg-gradient-to-t from-[#020202] to-[#1a0505] rounded-t-[50px] shadow-[inset_0_20px_50px_rgba(0,0,0,1),inset_0_2px_8px_rgba(255,255,255,0.08)] border-t border-red-950/30">
            <div class="absolute inset-0 flex justify-evenly px-4">
               <div class="w-[2px] h-full bg-black/40"></div><div class="w-[2px] h-full bg-black/40"></div>
            </div>
          </div>
          <div class="absolute top-[-30px] w-[110px] h-[70px] bg-gradient-to-b from-[#1f0707] to-[#0a0202] rounded-[35px] border-t border-red-900/40 shadow-[0_15px_25px_rgba(0,0,0,0.95),inset_0_5px_10px_rgba(255,255,255,0.05)]"></div>
          <div class="absolute bottom-0 -left-[15px] w-[30px] h-[100px] bg-gradient-to-t from-black to-[#111] rounded-t-xl border-t border-gray-800 shadow-[2px_0_10px_rgba(0,0,0,0.8)] z-10"></div>
        </div>`;
    }
    for (let i = 0; i < 11; i++) {
      footlights.innerHTML += `
        <div class="relative w-14 h-10 bg-gradient-to-b from-gray-600 to-gray-900 rounded-t-[20px] border-b-[8px] border-[#0a0502] flex justify-center shadow-[0_15px_30px_rgba(0,0,0,1),inset_0_2px_5px_rgba(255,255,255,0.3)]">
          <div class="footlight-bulb absolute bottom-1 w-7 h-6 rounded-t-full bg-gradient-to-b from-yellow-100 to-yellow-400" style="box-shadow: 0 0 5px 2px rgba(255, 200, 50, 0.1); transition: box-shadow 1s ease;"></div>
          <div class="footlight-glow absolute -bottom-8 w-20 h-16 bg-yellow-400/20 blur-[15px] rounded-full" style="opacity: 0; transition: opacity 1s ease;"></div>
        </div>`;
    }

    // --- HELPER: FOOTLIGHTS TOGGLE ---
    function setFootlightsBright(bright) {
      document.querySelectorAll('.footlight-bulb').forEach(b => {
        b.style.boxShadow = bright ? '0 -10px 50px 25px rgba(255, 230, 120, 0.9), inset 0 0 10px white' : '0 0 5px 2px rgba(255, 200, 50, 0.1)';
      });
      document.querySelectorAll('.footlight-glow').forEach(g => {
        g.style.opacity = bright ? '1' : '0';
      });
    }

    // --- DEV OVERRIDE LOGIC ---
    document.addEventListener('keydown', (e) => {
      if (e.shiftKey && e.key.toLowerCase() === 'd') {
        devMode = !devMode;
        document.getElementById('dev-overlay').style.display = devMode ? 'flex' : 'none';
      }
    });

    document.getElementById('download-btn').addEventListener('click', () => {
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      const pattern = getBarcodePattern(SECRET_CODE);
      const totalWidth = pattern.reduce((acc, val) => acc + val * 2.5, 0);
      
      canvas.width = totalWidth + 40;
      canvas.height = 120;
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      let x = 20;
      pattern.forEach((width, i) => {
        const barWidth = width * 2.5;
        if (i % 2 === 0) {
          ctx.fillStyle = '#000000';
          ctx.fillRect(x, 15, barWidth, 70);
        }
        x += barWidth;
      });
      
      ctx.fillStyle = '#000000';
      ctx.font = 'bold 16px monospace';
      ctx.textAlign = 'center';
      ctx.letterSpacing = '4px';
      ctx.fillText(SECRET_CODE, canvas.width / 2, 105);
      
      const link = document.createElement('a');
      link.download = `VIP-Pass-${SECRET_CODE}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
    });

    // --- SCANNER INPUT LOGIC ---
    const codeInput = document.getElementById('code-input');
    const authBtn = document.getElementById('auth-btn');
    const authBtnText = document.getElementById('auth-btn-text');
    
    codeInput.addEventListener('input', (e) => {
      e.target.value = e.target.value.toUpperCase();
      if (e.target.value.length >= 5) {
        authBtn.disabled = false;
        authBtn.className = 'w-full py-3 sm:py-4 rounded-2xl text-xs sm:text-sm font-medium tracking-wide transition-all duration-300 flex items-center justify-center space-x-2 bg-white text-black hover:bg-gray-200 hover:scale-[0.98] cursor-pointer';
      } else {
        authBtn.disabled = true;
        authBtn.className = 'w-full py-3 sm:py-4 rounded-2xl text-xs sm:text-sm font-medium tracking-wide transition-all duration-300 flex items-center justify-center space-x-2 bg-white/10 text-white/40 cursor-not-allowed';
      }
    });

    function setScannerUI(state) {
      document.getElementById('scan-idle').classList.add('hidden');
      document.getElementById('scan-laser').classList.add('hidden');
      document.getElementById('scan-verifying').classList.add('hidden');
      document.getElementById('scan-granted').classList.add('hidden');
      document.getElementById('scan-denied').classList.add('hidden');
      document.getElementById('scan-verifying').classList.remove('flex');
      document.getElementById('scan-granted').classList.remove('flex');
      document.getElementById('scan-denied').classList.remove('flex');
      
      const frame = document.getElementById('scanner-frame');
      const corners = [document.getElementById('corner-tl'), document.getElementById('corner-tr'), document.getElementById('corner-bl'), document.getElementById('corner-br')];
      
      frame.className = `absolute inset-0 transition-all duration-500 rounded-3xl sm:rounded-[2.5rem] border-[3px] border-white/30`;
      corners.forEach(c => c.classList.remove('border-red-400', 'border-green-400'));
      corners.forEach(c => c.classList.add('border-white'));

      if (state === 'idle') {
        document.getElementById('scan-idle').classList.remove('hidden');
        authBtnText.innerText = 'Authenticate';
      } else if (state === 'scanning' || state === 'verifying') {
        document.getElementById('scan-laser').classList.remove('hidden');
        document.getElementById('scan-verifying').classList.add('flex');
        document.getElementById('scan-verifying').classList.remove('hidden');
        authBtnText.innerText = 'Verifying...';
        codeInput.disabled = true;
        authBtn.disabled = true;
        authBtn.className = 'w-full py-3 sm:py-4 rounded-2xl text-xs sm:text-sm font-medium tracking-wide transition-all duration-300 flex items-center justify-center space-x-2 bg-white/10 text-white/40 cursor-not-allowed';
      } else if (state === 'granted') {
        document.getElementById('scan-granted').classList.add('flex');
        document.getElementById('scan-granted').classList.remove('hidden');
        frame.classList.replace('border-white/30', 'border-green-500/50');
        frame.classList.add('scale-95');
        corners.forEach(c => c.classList.replace('border-white', 'border-green-400'));
        authBtnText.innerText = 'Access Granted';
        authBtn.className = 'w-full py-3 sm:py-4 rounded-2xl text-xs sm:text-sm font-medium tracking-wide transition-all duration-300 flex items-center justify-center space-x-2 bg-green-500 text-white';
      } else if (state === 'denied') {
        document.getElementById('scan-denied').classList.add('flex');
        document.getElementById('scan-denied').classList.remove('hidden');
        frame.classList.replace('border-white/30', 'border-red-500/50');
        frame.classList.add('scale-105');
        corners.forEach(c => c.classList.replace('border-white', 'border-red-400'));
        authBtnText.innerText = 'Authenticate';
        codeInput.disabled = false;
        authBtn.disabled = false;
        authBtn.className = 'w-full py-3 sm:py-4 rounded-2xl text-xs sm:text-sm font-medium tracking-wide transition-all duration-300 flex items-center justify-center space-x-2 bg-white text-black hover:bg-gray-200 hover:scale-[0.98] cursor-pointer';
      }
    }

    document.getElementById('auth-form').addEventListener('submit', (e) => {
      e.preventDefault();
      setScannerUI('scanning');
      
      setTimeout(() => {
        setScannerUI('verifying');
        
        setTimeout(() => {
          if (codeInput.value.trim().toUpperCase() === SECRET_CODE) {
            setScannerUI('granted');
            setTimeout(() => {
              document.getElementById('ticket-view').classList.add('hidden');
              document.getElementById('theater-view').classList.remove('hidden');
              setFootlightsBright(true); // initial bright state
            }, 1500);
          } else {
            setScannerUI('denied');
            setTimeout(() => {
              setScannerUI('idle');
              codeInput.value = '';
              codeInput.dispatchEvent(new Event('input')); // trigger validation reset
            }, 2000);
          }
        }, 1200);
      }, 1000);
    });

    // --- THEATER SEQUENCE LOGIC ---
    const startOverlay = document.getElementById('start-overlay');
    const startShowBtn = document.getElementById('start-show-btn');
    const host = document.getElementById('cartoon-host');
    const dialogueText = document.getElementById('dialogue-text');
    const speechBubble = document.getElementById('speech-bubble');
    const leftCurtain = document.getElementById('left-curtain');
    const rightCurtain = document.getElementById('right-curtain');
    const mainVideo = document.getElementById('main-video');
    const outroVideo = document.getElementById('outro-video');
    const spotlightL = document.getElementById('spotlight-left');
    const spotlightR = document.getElementById('spotlight-right');
    const cameraZoom = document.getElementById('camera-zoom');
    const stageSurface = document.getElementById('stage-surface');

    const dialogs = [
      "Welcome to the Grand Birthday Premiere! 🎉",
      "I'm Buddy! I've been getting the stage ready for you.",
      "We have a VERY special presentation lined up.",
      "Alright, sit back, relax, and enjoy the show!",
      "Curtains... OPEN! 🎬"
    ];

    startShowBtn.addEventListener('click', () => {
      // Prime video for mobile autoplay
      mainVideo.play().then(() => mainVideo.pause()).catch(e => console.log(e));
      outroVideo.play().then(() => outroVideo.pause()).catch(e => console.log(e));
      
      startOverlay.classList.add('hidden');
      host.classList.remove('hidden');
      host.classList.add('flex');
      spotlightL.classList.remove('opacity-0');
      spotlightL.classList.add('opacity-100');
      spotlightR.classList.remove('opacity-0');
      spotlightR.classList.add('opacity-100');

      let dIndex = 0;
      const dInterval = setInterval(() => {
        dIndex++;
        if(dIndex < dialogs.length) {
          speechBubble.classList.remove('opacity-100');
          speechBubble.classList.add('opacity-0');
          setTimeout(() => {
            dialogueText.innerText = dialogs[dIndex];
            speechBubble.classList.remove('opacity-0');
            speechBubble.classList.add('opacity-100');
          }, 300);
        } else {
          clearInterval(dInterval);
          startOpeningSequence();
        }
      }, 3500);
    });

    function startOpeningSequence() {
      host.classList.add('hidden');
      spotlightL.classList.add('opacity-0');
      spotlightR.classList.add('opacity-0');
      
      // Open Curtains & Zoom
      leftCurtain.style.transform = 'scaleX(0.02) translateX(-20px) skewY(-2deg)';
      rightCurtain.style.transform = 'scaleX(0.02) translateX(20px) skewY(2deg)';
      cameraZoom.classList.replace('scale-100', 'scale-[1.15]');
      cameraZoom.classList.replace('translate-y-0', 'translate-y-[4vh]');
      
      // Dim Stage Shadow & Footlights
      stageSurface.style.boxShadow = 'inset 0 40px 100px rgba(255,255,255,0.08)';
      setFootlightsBright(false);
      dustContainer.classList.add('opacity-0');

      setTimeout(() => {
        mainVideo.classList.replace('opacity-0', 'opacity-100');
        mainVideo.play();
      }, 3500);
    }

    mainVideo.addEventListener('ended', () => {
      mainVideo.classList.replace('opacity-100', 'opacity-0');
      outroVideo.classList.replace('pointer-events-none', 'pointer-events-auto');
      outroVideo.classList.replace('opacity-0', 'opacity-100');
      outroVideo.play();
    });

    outroVideo.addEventListener('ended', () => {
      outroVideo.classList.replace('opacity-100', 'opacity-0');
      
      // Close Curtains & Unzoom
      leftCurtain.style.transform = 'scaleX(1) skewY(0deg)';
      rightCurtain.style.transform = 'scaleX(1) skewY(0deg)';
      cameraZoom.classList.replace('scale-[1.15]', 'scale-100');
      cameraZoom.classList.replace('translate-y-[4vh]', 'translate-y-0');
      
      // Brighten Stage Shadow & Footlights
      stageSurface.style.boxShadow = 'inset 0 60px 200px rgba(0,0,0,1)';
      setFootlightsBright(true);

      setTimeout(() => {
        startFinale();
      }, 3500);
    });

    function startFinale() {
      document.getElementById('finale-overlay').classList.remove('hidden');
      document.getElementById('finale-overlay').classList.add('flex');
      document.getElementById('confetti-canvas').classList.remove('hidden');
      startConfetti();
      
      countdownInterval = setInterval(updateCountdown, 1000);
      updateCountdown();
    }

    // --- COUNTDOWN LOGIC ---
    function updateCountdown() {
      const target = new Date("2027-04-27T00:00:00").getTime();
      const diff = target - new Date().getTime();
      const container = document.getElementById('countdown-container');

      if (diff > 0) {
        const days = Math.floor(diff / (1000 * 60 * 60 * 24)).toString().padStart(2, '0');
        const hours = Math.floor((diff / (1000 * 60 * 60)) % 24).toString().padStart(2, '0');
        const minutes = Math.floor((diff / 1000 / 60) % 60).toString().padStart(2, '0');
        const seconds = Math.floor((diff / 1000) % 60).toString().padStart(2, '0');

        container.innerHTML = `
          <div class="flex flex-col items-center justify-center bg-white/5 border border-white/10 rounded-2xl w-16 h-20 sm:w-24 sm:h-28 mx-1 sm:mx-2 backdrop-blur-md shadow-lg">
            <span class="text-2xl sm:text-4xl font-bold text-white mb-1 font-mono">${days}</span>
            <span class="text-[8px] sm:text-xs text-white/50 uppercase tracking-widest">Days</span>
          </div>
          <div class="flex flex-col items-center justify-center bg-white/5 border border-white/10 rounded-2xl w-16 h-20 sm:w-24 sm:h-28 mx-1 sm:mx-2 backdrop-blur-md shadow-lg">
            <span class="text-2xl sm:text-4xl font-bold text-white mb-1 font-mono">${hours}</span>
            <span class="text-[8px] sm:text-xs text-white/50 uppercase tracking-widest">Hours</span>
          </div>
          <div class="flex flex-col items-center justify-center bg-white/5 border border-white/10 rounded-2xl w-16 h-20 sm:w-24 sm:h-28 mx-1 sm:mx-2 backdrop-blur-md shadow-lg">
            <span class="text-2xl sm:text-4xl font-bold text-white mb-1 font-mono">${minutes}</span>
            <span class="text-[8px] sm:text-xs text-white/50 uppercase tracking-widest">Minutes</span>
          </div>
          <div class="flex flex-col items-center justify-center bg-white/5 border border-white/10 rounded-2xl w-16 h-20 sm:w-24 sm:h-28 mx-1 sm:mx-2 backdrop-blur-md shadow-lg">
            <span class="text-2xl sm:text-4xl font-bold text-white mb-1 font-mono">${seconds}</span>
            <span class="text-[8px] sm:text-xs text-white/50 uppercase tracking-widest">Seconds</span>
          </div>
        `;
      } else {
        container.innerHTML = `<span class="text-2xl text-green-400 font-bold tracking-widest">IT'S TIME! 🎉</span>`;
      }
    }

    // --- RESET LOGIC ---
    document.getElementById('reset-btn').addEventListener('click', () => {
      document.getElementById('finale-overlay').classList.add('hidden');
      document.getElementById('finale-overlay').classList.remove('flex');
      document.getElementById('confetti-canvas').classList.add('hidden');
      stopConfetti();
      clearInterval(countdownInterval);
      
      startOverlay.classList.remove('hidden');
      dustContainer.classList.remove('opacity-0');
      dialogueText.innerText = dialogs[0];
      
      document.getElementById('theater-view').classList.add('hidden');
      document.getElementById('ticket-view').classList.remove('hidden');
      
      setScannerUI('idle');
      codeInput.value = '';
      codeInput.dispatchEvent(new Event('input'));
    });

    // --- CONFETTI ANIMATION LOGIC ---
    let confettiParticles = [];
    function startConfetti() {
      const canvas = document.getElementById('confetti-canvas');
      const ctx = canvas.getContext('2d');
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;

      confettiParticles = Array.from({ length: 200 }).map(() => ({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height - canvas.height,
        size: Math.random() * 10 + 5,
        color: `hsl(${Math.random() * 360}, 100%, 50%)`,
        speedY: Math.random() * 3 + 2,
        speedX: Math.random() * 4 - 2,
        rotation: Math.random() * 360,
        rotationSpeed: Math.random() * 10 - 5
      }));

      function render() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        confettiParticles.forEach(p => {
          p.y += p.speedY;
          p.x += p.speedX;
          p.rotation += p.rotationSpeed;
          if (p.y > canvas.height) {
            p.y = -10;
            p.x = Math.random() * canvas.width;
          }
          ctx.save();
          ctx.translate(p.x, p.y);
          ctx.rotate((p.rotation * Math.PI) / 180);
          ctx.fillStyle = p.color;
          ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size);
          ctx.restore();
        });
        confettiFrame = requestAnimationFrame(render);
      }
      render();
    }
    
    function stopConfetti() {
      if (confettiFrame) cancelAnimationFrame(confettiFrame);
    }
    
    window.addEventListener('resize', () => {
      const cCanvas = document.getElementById('confetti-canvas');
      if(cCanvas) {
        cCanvas.width = window.innerWidth;
        cCanvas.height = window.innerHeight;
      }
    });
  </script>
</body>
</html>
