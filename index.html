<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>A Birthday To Remember</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<style>
body {
  margin: 0;
  overflow: hidden;
  background-color: #000;
}

/* Curtains */
.curtain-open-left {
  transform: translateX(-100%);
}
.curtain-open-right {
  transform: translateX(100%);
}

#left-curtain, #right-curtain {
  transition: transform 3s ease-in-out;
}
</style>
</head>

<body>

<!-- ================= TICKET VIEW ================= -->
<div id="ticket-view" class="fixed inset-0 w-full h-[100dvh] bg-black text-white font-sans flex flex-col items-center justify-between py-10 px-6 z-50">

  <!-- Background -->
  <div class="absolute inset-0 bg-gradient-to-b from-zinc-900 via-black to-black"></div>

  <!-- Header -->
  <div class="relative z-10 text-center space-y-2">
    <i data-lucide="camera" class="w-10 h-10 mx-auto"></i>
    <h1 class="text-xl font-medium">Scan Ticket</h1>
    <p class="text-white/50 text-xs">Enter your VIP access code</p>
  </div>

  <!-- Scanner -->
  <div class="relative z-10 w-[240px] h-[240px] border border-white/20 rounded-3xl flex items-center justify-center">
    <i data-lucide="barcode" class="w-16 h-16 text-white/30"></i>
  </div>

  <!-- Input -->
  <form id="auth-form" class="relative z-10 w-full max-w-sm space-y-3">

    <input
      id="code-input"
      type="text"
      placeholder="ENTER CODE"
      class="w-full bg-white/5 border border-white/10 rounded-2xl px-4 py-4 text-center tracking-[0.25em] uppercase text-white focus:outline-none focus:ring-2 focus:ring-white/30"
    />

    <button
      id="auth-btn"
      type="submit"
      disabled
      class="w-full py-4 rounded-2xl bg-white/10 text-white/40 font-medium disabled:opacity-40 disabled:cursor-not-allowed"
    >
      Authenticate
    </button>

  </form>

</div>

<!-- ================= THEATER VIEW ================= -->
<div id="theater-view" class="hidden fixed inset-0 w-screen h-screen bg-black overflow-hidden">

  <!-- VIDEO -->
<video
  id="main-video"
  src="https://www.dropbox.com/scl/fi/0k0b2rltlppcyhqhgz3hi/A-Birthday-To-Remember.mp4?rlkey=xb4t2kxp5hkc7xumtbt9l3avd&st=g5om3zwo&raw=1"
  class="absolute inset-0 w-full h-full object-cover"
  playsinline
  muted
  autoplay>
</video>

  <!-- CURTAINS -->
  <div id="left-curtain" class="absolute top-0 left-0 w-1/2 h-full bg-red-900 z-20"></div>
  <div id="right-curtain" class="absolute top-0 right-0 w-1/2 h-full bg-red-900 z-20"></div>

</div>

<script>
lucide.createIcons();

/* CAMERA */
async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
  } catch (e) {
    console.log("Camera blocked");
  }
}
startCamera();

/* VIP CODES */
const VALID_CODES = ["VIP-LH18", "VIP-GUEST", "VIP-STAFF"];

function validate(code) {
  return VALID_CODES.includes(code);
}

/* INPUT HANDLING */
const input = document.getElementById("code-input");
const btn = document.getElementById("auth-btn");

input.addEventListener("input", e => {
  e.target.value = e.target.value.toUpperCase();
  btn.disabled = e.target.value.length < 5;
});

/* THEATER START */
const ticketView = document.getElementById("ticket-view");
const theaterView = document.getElementById("theater-view");
const leftCurtain = document.getElementById("left-curtain");
const rightCurtain = document.getElementById("right-curtain");
const video = document.getElementById("main-video");

function startTheater() {
  ticketView.classList.add("hidden");
  theaterView.classList.remove("hidden");

  video.play().catch(() => {});

  setTimeout(() => {
    leftCurtain.classList.add("curtain-open-left");
    rightCurtain.classList.add("curtain-open-right");
  }, 800);
}

/* FORM SUBMIT */
document.getElementById("auth-form").addEventListener("submit", e => {
  e.preventDefault();

  const code = input.value.trim();

  if (validate(code)) {
    startTheater();
  } else {
    alert("Invalid Code");
    input.value = "";
    btn.disabled = true;
  }
});
</script>

</body>
</html>
