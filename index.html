<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>A Birthday To Remember</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<style>
body { margin:0; overflow:hidden; background:black; }

@keyframes scan {
  0% { top:5%; opacity:0; }
  15% { opacity:1; }
  85% { opacity:1; }
  100% { top:95%; opacity:0; }
}
.scan-line {
  animation: scan 2.5s infinite;
}
</style>
</head>

<body>

<!-- ================= TICKET VIEW ================= -->
<div id="ticket-view" class="fixed inset-0 bg-black text-white flex flex-col items-center justify-center">

  <h1 class="text-2xl mb-6">Scan Ticket</h1>

  <input id="code-input"
    class="px-4 py-3 rounded bg-white/10 text-center tracking-widest"
    placeholder="ENTER CODE"
  />

  <button id="auth-btn"
    class="mt-4 px-6 py-3 bg-white text-black rounded disabled:opacity-40"
    disabled>
    Authenticate
  </button>

  <p id="status" class="mt-4 text-sm opacity-60"></p>

</div>

<!-- ================= THEATER VIEW ================= -->
<div id="theater-view" class="hidden w-full h-[100dvh] relative bg-black overflow-hidden">

  <!-- VIDEO -->
  <video id="main-video"
    class="absolute inset-0 w-full h-full object-cover opacity-0 transition-opacity duration-1000"
    src="https://www.dropbox.com/scl/fi/0k0b2rltlppcyhqhgz3hi/A-Birthday-To-Remember.mp4?rlkey=xb4t2kxp5hkc7xumtbt9l3avd&st=g5om3zwo&raw=1"
    playsinline
    muted>
  </video>

  <!-- CURTAINS -->
  <div id="left-curtain"
    style="
      position:absolute;
      top:0; left:0;
      width:52%; height:100%;
      background: linear-gradient(90deg,#3a0000,#6b0000,#a00000);
      z-index:10;
      transition: transform 3s ease;
    "></div>

  <div id="right-curtain"
    style="
      position:absolute;
      top:0; right:0;
      width:52%; height:100%;
      background: linear-gradient(-90deg,#3a0000,#6b0000,#a00000);
      z-index:10;
      transition: transform 3s ease;
    "></div>

</div>

<script>
// ================= VALID CODES =================
const VALID = ["VIP-LH18", "VIP-GUEST", "VIP-STAFF"];

// ================= ELEMENTS =================
const input = document.getElementById("code-input");
const btn = document.getElementById("auth-btn");
const status = document.getElementById("status");

const ticketView = document.getElementById("ticket-view");
const theaterView = document.getElementById("theater-view");

const video = document.getElementById("main-video");
const leftCurtain = document.getElementById("left-curtain");
const rightCurtain = document.getElementById("right-curtain");

// ================= INPUT LOGIC =================
input.addEventListener("input", e => {
  e.target.value = e.target.value.toUpperCase();
  btn.disabled = e.target.value.length < 5;
});

btn.addEventListener("click", () => {
  const code = input.value.trim();

  status.textContent = "Verifying...";

  setTimeout(() => {
    if (VALID.includes(code)) {

      status.textContent = "Access Granted";

      // Switch views
      ticketView.classList.add("hidden");
      theaterView.classList.remove("hidden");

      // AUTO START THEATER
      startTheater();

    } else {
      status.textContent = "Invalid Code";
    }
  }, 800);
});

// ================= THEATER START =================
function startTheater() {

  // Start video
  video.play().catch(()=>{});
  video.classList.add("opacity-100");

  // Open curtains
  setTimeout(() => {
    leftCurtain.style.transform = "translateX(-100%)";
    rightCurtain.style.transform = "translateX(100%)";
  }, 500);
}

</script>

</body>
</html>
