<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>A Birthday To Remember</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    @keyframes scan-laser-smooth {
      0% { top: 5%; opacity: 0; }
      15% { opacity: 1; }
      85% { opacity: 1; }
      100% { top: 95%; opacity: 0; }
    }
    @keyframes fade-in-down {
      0% { opacity: 0; transform: translateY(-20px) translateX(-50%); }
      100% { opacity: 1; transform: translateY(0) translateX(-50%); }
    }
    @keyframes pop-in {
      0% { opacity: 0; transform: scale(0.8); }
      50% { transform: scale(1.1); }
      100% { opacity: 1; transform: scale(1); }
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-5px); }
      40%, 80% { transform: translateX(5px); }
    }
    @keyframes float-dust {
      0% { transform: translateY(0) rotate(0deg); }
      100% { transform: translateY(-100vh) rotate(360deg); }
    }
    @keyframes breathe {
      0%, 100% { transform: translateY(0px) scale(1); }
      50% { transform: translateY(-15px) scale(1.01); }
    }
    @keyframes shimmer {
      100% { transform: translateX(100%); }
    }
    @keyframes fade-in {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }
    @keyframes hover-bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }

    body {
      margin: 0;
      overflow: hidden;
      background-color: #000;
    }

    .transform-style-preserve-3d {
      transform-style: preserve-3d;
    }
  </style>
</head>

<body>

<!-- ================= TICKET SCANNER ================= -->
<div id="ticket-view" class="fixed inset-0 w-full h-[100dvh] bg-black overflow-hidden z-50 flex flex-col items-center">

  <div id="dev-overlay" class="hidden fixed top-6 left-1/2 -translate-x-1/2 z-[60] w-[90%] max-w-sm bg-white/10 backdrop-blur-2xl border border-white/20 p-6 rounded-[2rem] flex-col items-center">
    <p class="text-white">DEV MODE</p>
  </div>

  <video id="camera-feed" autoplay playsinline muted class="absolute inset-0 w-full h-full object-cover opacity-0"></video>

  <div class="relative z-10 w-full h-full max-w-md mx-auto flex flex-col justify-between py-6 px-4">

    <div class="text-center text-white mt-6">
      <h1 class="text-xl">Scan Ticket</h1>
      <p class="text-xs opacity-60">Position barcode in frame</p>
    </div>

    <div class="relative w-[60%] aspect-square mx-auto border-2 border-white/30 rounded-3xl flex items-center justify-center">
      <div id="scan-idle" class="text-white/30">▦</div>
      <div id="scan-laser" class="hidden absolute w-full h-[2px] bg-white animate-[scan-laser-smooth_2.5s_infinite]"></div>

      <div id="scan-verifying" class="hidden text-white">Verifying...</div>
      <div id="scan-granted" class="hidden text-green-400">✔</div>
      <div id="scan-denied" class="hidden text-red-400">✖</div>
    </div>

    <form id="auth-form" class="space-y-3">
      <input id="code-input" class="w-full p-3 text-center bg-white/10 text-white rounded-xl uppercase" placeholder="ENTER CODE">
      <button id="auth-btn" disabled class="w-full p-3 bg-white/10 text-white/40 rounded-xl">Authenticate</button>
    </form>

  </div>
</div>

<!-- ================= THEATER ================= -->
<div id="theater-view" class="hidden w-full h-[100dvh] bg-black relative overflow-hidden">

  <div id="camera-zoom" class="absolute inset-0">

    <!-- STAGE -->
    <div class="relative w-[90vw] max-w-[1200px] aspect-video mx-auto mt-10 bg-black">

      <video id="main-video" class="absolute inset-0 w-full h-full object-cover opacity-0"></video>

      <div id="left-curtain" class="absolute top-0 left-0 w-1/2 h-full bg-red-900 z-20"></div>
      <div id="right-curtain" class="absolute top-0 right-0 w-1/2 h-full bg-red-900 z-20"></div>

      <div id="start-overlay" class="absolute inset-0 z-30 flex flex-col items-center justify-center bg-black/60">
        <button id="start-show-btn" class="px-10 py-5 bg-red-600 text-white rounded-full text-2xl">
          START SHOW
        </button>
      </div>

    </div>
  </div>
</div>

<script>
lucide.createIcons();

const VALID_CODES = [{ code: "VIP-LH18" }];

const codeInput = document.getElementById('code-input');
const authBtn = document.getElementById('auth-btn');

codeInput.addEventListener('input', e => {
  e.target.value = e.target.value.toUpperCase();
  authBtn.disabled = e.target.value.length < 5;
});

document.getElementById('auth-form').addEventListener('submit', e => {
  e.preventDefault();
  const code = codeInput.value.trim();

  if (VALID_CODES.find(v => v.code === code)) {
    document.getElementById('ticket-view').classList.add('hidden');
    document.getElementById('theater-view').classList.remove('hidden');
  }
});

document.getElementById('start-show-btn').addEventListener('click', () => {
  document.getElementById('left-curtain').style.transform = "translateX(-100%)";
  document.getElementById('right-curtain').style.transform = "translateX(100%)";

  const video = document.getElementById('main-video');
  video.style.opacity = "1";
  video.play();
});
</script>

</body>
</html>
